<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogLens</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/css/app.css">
<style>
:root { --c-bg:#0a0e17; --c-surface:#111827; --c-surface-raised:#1a2234; --c-border:#243049; --c-text:#f3f4f6; --c-text-dim:#9ca3af; --c-text-muted:#6b7280; --c-text-faint:#4b5563; --c-accent:#60a5fa; --c-accent-mid:#3b82f6; --c-accent-deep:#2563eb; --c-success:#22c55e; --c-warning:#f59e0b; --c-danger:#ef4444; --c-scrollbar-track:#111827; --c-scrollbar-thumb:#243049; --c-input-bg:var(--c-surface-raised); --c-hover:rgba(255,255,255,.05); --c-shadow:rgba(0,0,0,.4); --c-gray-50:#0f172a; --c-gray-100:#1e293b; --c-gray-200:#e5e7eb; --c-gray-300:#d1d5db; --c-gray-400:#9ca3af; --c-gray-500:#6b7280; --c-gray-600:#4b5563; --c-gray-700:#374151; --c-gray-800:#1f2937; --c-gray-900:#111827; }
html:not(.dark) { --c-bg:#f8fafc; --c-surface:#ffffff; --c-surface-raised:#f1f5f9; --c-border:#e2e8f0; --c-text:#1e293b; --c-text-dim:#475569; --c-text-muted:#64748b; --c-text-faint:#94a3b8; --c-accent:#3b82f6; --c-accent-mid:#2563eb; --c-accent-deep:#1d4ed8; --c-success:#16a34a; --c-warning:#d97706; --c-danger:#dc2626; --c-scrollbar-track:#f1f5f9; --c-scrollbar-thumb:#cbd5e1; --c-input-bg:#ffffff; --c-hover:rgba(0,0,0,.04); --c-shadow:rgba(0,0,0,.08); --c-gray-50:#f8fafc; --c-gray-100:#f1f5f9; --c-gray-200:#334155; --c-gray-300:#475569; --c-gray-400:#64748b; --c-gray-500:#64748b; --c-gray-600:#475569; --c-gray-700:#334155; --c-gray-800:#1e293b; --c-gray-900:#0f172a; }
*{scrollbar-width:thin;scrollbar-color:var(--c-scrollbar-thumb) var(--c-scrollbar-track)}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-track{background:var(--c-scrollbar-track)}
*::-webkit-scrollbar-thumb{background:var(--c-scrollbar-thumb);border-radius:3px}
.drag-active{border-color:var(--c-accent-mid)!important;background:var(--c-hover)!important}
.spinner{border:3px solid var(--c-surface-raised);border-top-color:var(--c-accent-mid);border-radius:50%;width:40px;height:40px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tab-active{background:var(--c-surface-raised);color:var(--c-text);box-shadow:0 1px 3px var(--c-shadow)}
[x-cloak]{display:none!important}
@media print {
  body { background: white !important; color: #111 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .bg-dark-800, .bg-dark-700, .bg-dark-900 { background: #f9fafb !important; border-color: #e5e7eb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .text-white, .text-gray-200, .text-gray-300 { color: #111 !important; }
  .text-gray-400, .text-gray-500 { color: #4b5563 !important; }
  .text-accent-400 { color: #2563eb !important; }
  .text-success { color: #16a34a !important; }
  .text-warning { color: #d97706 !important; }
  .text-danger { color: #dc2626 !important; }
  .border-dark-600, .border-dark-700 { border-color: #d1d5db !important; }
  button, .spinner { display: none !important; }
  #report-content .rounded-xl { break-inside: avoid; page-break-inside: avoid; }
  canvas[data-chart] { max-width: 100% !important; }
}
.table-scroll thead th:first-child,
.table-scroll tbody td:first-child { position: sticky; left: 0; z-index: 1; }
.table-scroll thead th:first-child { background: var(--c-surface-raised); }
.table-scroll tbody td:first-child { background: var(--c-surface); }
.table-scroll tbody tr:hover td:first-child { background: var(--c-surface-raised); }
</style>
<script defer src="/static/js/alpine.min.js"></script>
<script src="/static/js/chart.umd.min.js"></script>
<script src="/static/js/html2pdf.bundle.min.js"></script>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.remove('dark');else document.documentElement.classList.add('dark');</script>
</head>
<body class="min-h-screen font-sans" style="background:var(--c-bg);color:var(--c-text)">

<script>
document.addEventListener('alpine:init', () => {
  Alpine.store('auth', {
    token: null,
    loggedIn: false,
    async login(apiKey) {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({api_key: apiKey})
      });
      if (!res.ok) throw new Error('Invalid key');
      const data = await res.json();
      this.token = data.token;
      this.loggedIn = true;
    },
    async checkSession() {
      try {
        const res = await fetch('/api/session');
        if (res.ok) {
          const data = await res.json();
          this.token = data.token || null;
          this.loggedIn = true;
          return true;
        }
      } catch(e) {}
      this.loggedIn = false;
      return false;
    },
    async logout() {
      try { await fetch('/api/logout', {method:'POST', headers:{'Authorization':'Bearer '+this.token}}); } catch(e) {}
      this.token = null; this.loggedIn = false;
    },
  });

  Alpine.store('theme', {
    dark: localStorage.getItem('theme') !== 'light',
    toggle() { this.dark = !this.dark; localStorage.setItem('theme', this.dark ? 'dark' : 'light'); document.documentElement.classList.toggle('dark', this.dark); }
  });

  Alpine.data('analyzer', () => ({
    view: 'upload',
    inputMode: 'file',
    logType: 'auto',
    excludeIps: '',
    report: null,
    error: null,
    file: null,
    pasteContent: '',
    dragOver: false,
    pdfExporting: false,
    pdfError: null,
    toastMessage: null,
    toastType: 'info',
    uploadProgress: -1,
    _showToast(msg, type, duration) { this.toastMessage = msg; this.toastType = type || 'info'; setTimeout(() => { if (this.toastMessage === msg) this.toastMessage = null; }, duration || 4000); },

    async analyze() {
      this.view = 'processing';
      this.error = null;
      try {
        if (this.file) {
          await this._uploadFile();
          return;
        } else if (this.pasteContent.trim()) {
          const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: {'Authorization': 'Bearer ' + Alpine.store('auth').token, 'Content-Type': 'application/json'},
            body: JSON.stringify({content: this.pasteContent, log_type: this.logType, exclude_ips: this.excludeIps})
          });
          await this._handleResponse(res);
        } else {
          throw new Error('No content provided');
        }
      } catch(e) {
        if (e.message === 'SESSION_EXPIRED') { this.error = 'Session expired — please sign in again.'; }
        else { this.error = e.message; }
        this.view = 'upload';
      }
    },
    _uploadFile() {
      return new Promise((resolve, reject) => {
        this.uploadProgress = 0;
        const fd = new FormData();
        fd.append('file', this.file);
        fd.append('log_type', this.logType);
        fd.append('exclude_ips', this.excludeIps);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/analyze');
        xhr.setRequestHeader('Authorization', 'Bearer ' + Alpine.store('auth').token);
        xhr.upload.addEventListener('progress', (e) => { if (e.lengthComputable) this.uploadProgress = Math.round(e.loaded / e.total * 100); });
        xhr.addEventListener('load', () => {
          this.uploadProgress = -1;
          if (xhr.status === 401) { Alpine.store('auth').logout(); reject(new Error('SESSION_EXPIRED')); return; }
          try { const data = JSON.parse(xhr.responseText); if (xhr.status >= 200 && xhr.status < 300) { this.report = data; if (data.error) { reject(new Error(data.error)); return; } this.view = 'report'; this.$nextTick(() => renderCharts(this.report)); resolve(); } else { reject(new Error(data.detail || 'Analysis failed')); } } catch(_) { reject(new Error('Analysis failed')); }
        });
        xhr.addEventListener('error', () => { this.uploadProgress = -1; reject(new Error('Network error')); });
        xhr.send(fd);
      });
    },
    async _handleResponse(res) {
      if (!res.ok) {
        if (res.status === 401) { Alpine.store('auth').logout(); throw new Error('SESSION_EXPIRED'); }
        const e = await res.json(); throw new Error(e.detail || 'Analysis failed');
      }
      this.report = await res.json();
      if (this.report.error) throw new Error(this.report.error);
      this.view = 'report';
      this.$nextTick(() => renderCharts(this.report));
    },
    reset() { this.view = 'upload'; this.report = null; this.error = null; this.file = null; this.pasteContent = ''; this.logType = 'auto'; this.excludeIps = ''; },
    exportJson() {
      if (!this.report) return;
      const blob = new Blob([JSON.stringify(this.report, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `loglens-report-${this.report.log_type}-${Date.now()}.json`;
      a.click(); URL.revokeObjectURL(url);
    },
    healthLabel(h) { return h === 'healthy' ? 'Healthy' : h === 'degraded' ? 'Degraded' : h === 'critical' ? 'Critical' : null; },
    healthColor(h) { const cs = getComputedStyle(document.documentElement); return h === 'healthy' ? cs.getPropertyValue('--c-success').trim() : h === 'degraded' ? cs.getPropertyValue('--c-warning').trim() : h === 'critical' ? cs.getPropertyValue('--c-danger').trim() : '#9ca3af'; },
    buildExportHeader() {
      const r = this.report;
      const chips = [];
      chips.push(`<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25);">${r.log_type_label || r.log_type || 'unknown'}</span>`);
      const health = r.summary && r.summary.health;
      if (health) {
        const c = this.healthColor(health);
        chips.push(`<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;background:${c}26;color:${c};border:1px solid ${c}40;"><span style="width:6px;height:6px;border-radius:9999px;background:${c};"></span>${this.healthLabel(health)}</span>`);
      }
      if (r.summary && r.summary.incident_count > 0) {
        chips.push(`<span style="font-size:11px;color:#f59e0b;">${r.summary.incident_count} incident(s) detected</span>`);
      }
      if (r.time_range && r.time_range.start) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">${r.time_range.start} &mdash; ${r.time_range.end}</span>`);
      }
      if (r.processing_ms != null) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">Parsed in ${r.processing_ms}ms</span>`);
      }
      if (r.parsed != null) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">${r.parsed} of ${r.total_lines} entries</span>`);
      }
      if (r.parse_errors > 0) {
        chips.push(`<span style="font-size:11px;color:#f59e0b;">${r.parse_errors} parse errors</span>`);
      }
      if (r.excluded_ips && r.excluded_ips.length) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">Excluded: ${r.excluded_ips.join(', ')}</span>`);
      }
      return `<div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #243049;">
        <div style="font-size:22px;font-weight:700;color:#fff;">Analysis Report</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;">${chips.join('')}</div>
        <div style="font-size:10px;color:#6b7280;margin-top:10px;">Generated by LogLens on ${new Date().toLocaleString()}</div>
      </div>`;
    },
    async exportPdf() {
      if (!this.report) return;
      this.pdfExporting = true;
      this.pdfError = null;
      await this.$nextTick();
      await new Promise(r => setTimeout(r, 1100));

      const sourceContent = document.getElementById('report-content');
      if (!sourceContent) { this.pdfExporting = false; return; }

      if (typeof html2pdf === 'undefined') {
        this.pdfExporting = false;
        this._showToast('PDF library unavailable — opening browser print dialog instead.', 'warning', 5000);
        window.print();
        return;
      }

      const pdfMargin = [10, 10, 16, 10];
      const pdfPageWidthMm = 420;
      const pdfContentWidthPx = Math.round((pdfPageWidthMm - pdfMargin[1] - pdfMargin[3]) * 96 / 25.4);

      const exportRoot = document.createElement('div');
      exportRoot.setAttribute('x-ignore', '');
      exportRoot.style.cssText = 'width:100%;background:#0a0e17;color:#e5e7eb;padding:24px;font-family:sans-serif;';
      exportRoot.innerHTML = this.buildExportHeader();
      const contentClone = sourceContent.cloneNode(true);
      exportRoot.appendChild(contentClone);

      function renderAlpineToStatic(element, report) {
        function getValue(obj, path) {
          if (!path) return null;
          const parts = path.split('.');
          let current = obj;
          for (const part of parts) {
            if (current && current[part] !== undefined) current = current[part];
            else return null;
          }
          return current;
        }
        function formatNum(v) { return v != null ? Number(v).toLocaleString() : '\u2014'; }
        function formatPct(v) { return v != null ? v + '%' : '\u2014'; }
        function formatBytes(b) {
          if (b == null) return '\u2014';
          for (const u of ['B','KB','MB','GB','TB']) { if (Math.abs(b) < 1024) return b.toFixed(b < 10 && u !== 'B' ? 2 : 0) + ' ' + u; b /= 1024; }
          return b.toFixed(2) + ' PB';
        }
        function healthLabel(h) {
          return h === 'healthy' ? 'Healthy' : h === 'degraded' ? 'Degraded' : h === 'critical' ? 'Critical' : null;
        }

        element.querySelectorAll('[x-text]').forEach(el => {
          const expr = el.getAttribute('x-text').trim();
          let value = null;
          if (expr.includes('formatNum(')) {
            const m = expr.match(/formatNum\(([^)]+)\)/);
            if (m) value = formatNum(getValue(report, m[1]));
          } else if (expr.includes('formatPct(')) {
            const m = expr.match(/formatPct\(([^)]+)\)/);
            if (m) value = formatPct(getValue(report, m[1]));
          } else if (expr.includes('formatBytes(')) {
            const m = expr.match(/formatBytes\(([^)]+)\)/);
            if (m) value = formatBytes(getValue(report, m[1]));
          } else if (expr.includes('healthLabel(')) {
            const m = expr.match(/healthLabel\(([^)]+)\)/);
            if (m) value = healthLabel(getValue(report, m[1]));
          } else if (expr.includes(' || ')) {
            const parts = expr.split('||').map(p => p.trim());
            for (const part of parts) {
              let val = null;
              if (part.startsWith('report.')) val = getValue(report, part.replace('report.', ''));
              else if (part.match(/^['"].*['"]$/)) val = part.slice(1, -1);
              else { const sm = part.match(/(\w+)\.(\w+)/); if (sm) val = getValue(report, sm[1]+'.'+sm[2]); }
              if (val !== null && val !== undefined && val !== '') { value = String(val); break; }
            }
            if (!value) value = '\u2014';
          } else if (expr.startsWith('report.')) {
            const val = getValue(report, expr.replace('report.', ''));
            value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
          } else {
            const val = getValue(report, expr.replace(/^report\./, ''));
            value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
          }
          if (value !== null && value !== undefined) el.textContent = value;
          el.removeAttribute('x-text');
        });

        element.querySelectorAll('[x-for]').forEach(el => {
          const expr = el.getAttribute('x-for');
          const match = expr.match(/\((\w+),\s*(\w+)\)\s+in\s+([^\s]+)/);
          if (!match) return;
          const itemName = match[1], indexName = match[2];
          const dataPath = match[3].replace(/^report\./, '');
          const data = getValue(report, dataPath);
          const parent = el.parentNode;
          if (!data || !Array.isArray(data) || data.length === 0) { el.remove(); return; }
          const tpl = el.cloneNode(true);
          tpl.removeAttribute('x-for');
          data.forEach((item, idx) => {
            const row = tpl.cloneNode(true);
            row.querySelectorAll('[x-text]').forEach(cell => {
              const cellExpr = cell.getAttribute('x-text');
              let value = null;
              if (cellExpr.includes(itemName + '.')) {
                const path = cellExpr.replace(itemName + '.', '');
                const val = getValue(item, path);
                value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
              } else if (cellExpr.includes(indexName)) {
                value = String(idx + 1);
              } else if (cellExpr.includes('formatNum(')) {
                const m2 = cellExpr.match(/formatNum\(([^)]+)\)/);
                if (m2) { const p = m2[1].replace(itemName+'.',''); value = formatNum(getValue(item, p)); }
              } else if (cellExpr.includes('formatPct(')) {
                const m2 = cellExpr.match(/formatPct\(([^)]+)\)/);
                if (m2) { const p = m2[1].replace(itemName+'.',''); value = formatPct(getValue(item, p)); }
              } else if (cellExpr.includes('formatBytes(')) {
                const m2 = cellExpr.match(/formatBytes\(([^)]+)\)/);
                if (m2) { const p = m2[1].replace(itemName+'.',''); value = formatBytes(getValue(item, p)); }
              } else {
                const val = getValue(item, cellExpr.replace(/^report\./, ''));
                value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
              }
              if (value !== null && value !== undefined) cell.textContent = value;
              cell.removeAttribute('x-text');
            });
            row.querySelectorAll('[class]').forEach(cell => {
              cell.className = cell.className.split(' ').filter(c => !c.includes('{') && !c.includes('}') && !c.includes('"')).join(' ');
            });
            parent.insertBefore(row, el);
          });
          parent.removeChild(el);
        });

        element.querySelectorAll('[x-data], [x-init], [x-cloak]').forEach(el => {
          Array.from(el.attributes).forEach(attr => {
            if (attr.name.startsWith('x-') || attr.name.startsWith('@') || attr.name === 'x-data' || attr.name === 'x-init' || attr.name === 'x-cloak') el.removeAttribute(attr.name);
          });
        });
      }

      renderAlpineToStatic(contentClone, this.report);

      const liveCanvases = sourceContent.querySelectorAll('canvas[data-chart]');
      const clonedCanvases = contentClone.querySelectorAll('canvas[data-chart]');
      liveCanvases.forEach((liveCanvas, i) => {
        const cloneCanvas = clonedCanvases[i];
        if (!cloneCanvas || liveCanvas.width === 0 || liveCanvas.height === 0) return;
        try {
          const chart = Chart.getChart(liveCanvas);
          if (chart) chart.update('none');
          const img = document.createElement('img');
          img.src = liveCanvas.toDataURL('image/png', 1.0);
          img.style.cssText = 'width:100%;height:auto;max-width:100%;display:block;';
          img.setAttribute('data-chart-replaced', 'true');
          cloneCanvas.parentNode.replaceChild(img, cloneCanvas);
        } catch(e) { console.warn('Chart conversion failed:', e); }
      });

      contentClone.querySelectorAll('[style*="display: none"], [style*="display:none"], .hidden, [hidden]').forEach(el => el.remove());
      contentClone.querySelectorAll('.overflow-x-auto').forEach(el => { el.style.overflow = 'visible'; el.style.maxWidth = '100%'; });
      contentClone.querySelectorAll('.rounded-xl').forEach(el => { el.style.breakInside = 'avoid'; el.style.pageBreakInside = 'avoid'; });

      const prevOverflowX = document.documentElement.style.overflowX;
      document.documentElement.style.overflowX = 'hidden';
      document.body.appendChild(exportRoot);

      const opt = {
        margin: pdfMargin,
        filename: `loglens-report-${this.report.log_type}-${Date.now()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#0a0e17',
          windowWidth: pdfContentWidthPx, logging: false,
          onclone: (doc) => {
            const imgs = doc.querySelectorAll('img');
            return Promise.all(Array.from(imgs).map(img => {
              if (img.complete) return Promise.resolve();
              return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; setTimeout(resolve, 500); });
            }));
          }
        },
        jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape', compress: true },
        pagebreak: { mode: ['css', 'avoid-all', 'legacy'], after: '.page-break-after' },
      };

      try {
        const pdf = await html2pdf().set(opt).from(exportRoot).toPdf().get('pdf');
        const pageCount = pdf.internal.getNumberOfPages();
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const stamp = new Date().toLocaleString();
        for (let i = 1; i <= pageCount; i++) {
          pdf.setPage(i);
          pdf.setFontSize(7);
          pdf.setTextColor(100, 100, 100);
          pdf.text(`LogLens · ${this.report.log_type_label || this.report.log_type}`, 10, 8);
          pdf.text(`Generated ${stamp}`, pageWidth - 10, 8, { align: 'right' });
          pdf.setFontSize(8);
          pdf.setTextColor(140, 140, 140);
          pdf.text(`Page ${i} of ${pageCount}`, pageWidth / 2, pageHeight - 6, { align: 'center' });
        }
        pdf.save(opt.filename);
      } catch(e) {
        console.error('PDF export failed:', e);
        this._showToast('PDF generation failed — opening browser print dialog instead.', 'warning', 5000);
        window.print();
      } finally {
        if (document.body.contains(exportRoot)) document.body.removeChild(exportRoot);
        document.documentElement.style.overflowX = prevOverflowX;
        this.$nextTick(() => renderCharts(this.report));
        this.pdfExporting = false;
      }
    },
    formatBytes(b) {
      if (b == null) return '\u2014';
      for (const u of ['B','KB','MB','GB','TB']) { if (Math.abs(b) < 1024) return b.toFixed(b < 10 && u !== 'B' ? 2 : 0) + ' ' + u; b /= 1024; }
      return b.toFixed(2) + ' PB';
    },
    formatNum(v) { return v != null ? Number(v).toLocaleString() : '\u2014'; },
    formatPct(v) { return v != null ? v + '%' : '\u2014'; }
  }));
});
</script>

<script>
function renderCharts(report) {
  const cs = getComputedStyle(document.documentElement);
  const tickColor = cs.getPropertyValue('--c-text-dim').trim() || '#9ca3af';
  const gridColor = cs.getPropertyValue('--c-border').trim() || '#243049';
  const accentMid = cs.getPropertyValue('--c-accent-mid').trim() || '#3b82f6';
  const successC = cs.getPropertyValue('--c-success').trim() || '#22c55e';
  const warningC = cs.getPropertyValue('--c-warning').trim() || '#f59e0b';
  const dangerC = cs.getPropertyValue('--c-danger').trim() || '#ef4444';

  const charts = report.charts || {};
  document.querySelectorAll('canvas[data-chart]').forEach(c => {
    const existing = Chart.getChart(c);
    if (existing) existing.destroy();
  });

  const doughnutOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: tickColor, padding: 12 } } } };
  const barOpts = (horizontal) => ({
    indexAxis: horizontal ? 'y' : 'x',
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      x: { ticks: { color: tickColor }, grid: { color: gridColor } },
      y: { ticks: { color: tickColor, font: { size: 11 } }, grid: { display: false } }
    },
    plugins: { legend: { display: false } }
  });

  if (charts.status_distribution) {
    new Chart(document.getElementById('chart-status'), {
      type: 'doughnut',
      data: {
        labels: charts.status_distribution.map(d => d.label),
        datasets: [{ data: charts.status_distribution.map(d => d.value), backgroundColor: [successC, warningC, dangerC,'#8b5cf6','#ec4899','#6366f1','#14b8a6'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.level_distribution) {
    new Chart(document.getElementById('chart-levels'), {
      type: 'doughnut',
      data: {
        labels: charts.level_distribution.map(d => d.label),
        datasets: [{ data: charts.level_distribution.map(d => d.value), backgroundColor: [successC, accentMid, warningC, dangerC,'#8b5cf6','#6b7280'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.method_distribution) {
    new Chart(document.getElementById('chart-methods'), {
      type: 'doughnut',
      data: {
        labels: charts.method_distribution.map(d => d.label),
        datasets: [{ data: charts.method_distribution.map(d => d.value), backgroundColor: [accentMid, successC, warningC, dangerC,'#8b5cf6','#6366f1'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.process_distribution) {
    new Chart(document.getElementById('chart-processes'), {
      type: 'doughnut',
      data: {
        labels: charts.process_distribution.map(d => d.label),
        datasets: [{ data: charts.process_distribution.map(d => d.value), backgroundColor: [accentMid, successC, warningC, dangerC,'#8b5cf6','#6366f1','#14b8a6','#ec4899'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.stream_distribution) {
    new Chart(document.getElementById('chart-streams'), {
      type: 'doughnut',
      data: {
        labels: charts.stream_distribution.map(d => d.label),
        datasets: [{ data: charts.stream_distribution.map(d => d.value), backgroundColor: [accentMid, dangerC], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.hourly_timeline) {
    new Chart(document.getElementById('chart-timeline'), {
      type: 'bar',
      data: {
        labels: charts.hourly_timeline.map(d => d.label),
        datasets: [{ label: 'Count', data: charts.hourly_timeline.map(d => d.value), backgroundColor: accentMid, borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.top_endpoints) {
    new Chart(document.getElementById('chart-endpoints'), {
      type: 'bar',
      data: {
        labels: charts.top_endpoints.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_endpoints.slice(0, 10).map(d => d.value), backgroundColor: '#6366f1', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_ips) {
    new Chart(document.getElementById('chart-ips'), {
      type: 'bar',
      data: {
        labels: charts.top_ips.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_ips.slice(0, 10).map(d => d.value), backgroundColor: successC, borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_source_ips) {
    new Chart(document.getElementById('chart-source-ips'), {
      type: 'bar',
      data: {
        labels: charts.top_source_ips.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_source_ips.slice(0, 10).map(d => d.value), backgroundColor: dangerC, borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_targeted_users) {
    new Chart(document.getElementById('chart-targeted-users'), {
      type: 'bar',
      data: {
        labels: charts.top_targeted_users.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_targeted_users.slice(0, 10).map(d => d.value), backgroundColor: warningC, borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_clients) {
    new Chart(document.getElementById('chart-clients'), {
      type: 'bar',
      data: {
        labels: charts.top_clients.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_clients.slice(0, 10).map(d => d.value), backgroundColor: warningC, borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_messages && charts.top_messages.length) {
    new Chart(document.getElementById('chart-top-messages'), {
      type: 'bar',
      data: {
        labels: charts.top_messages.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_messages.slice(0, 10).map(d => d.value), backgroundColor: '#8b5cf6', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_errors && charts.top_errors.length) {
    new Chart(document.getElementById('chart-errors'), {
      type: 'bar',
      data: {
        labels: charts.top_errors.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_errors.slice(0, 10).map(d => d.value), backgroundColor: dangerC, borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.auth_fail_messages && charts.auth_fail_messages.length) {
    new Chart(document.getElementById('chart-auth-fails'), {
      type: 'bar',
      data: {
        labels: charts.auth_fail_messages.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.auth_fail_messages.slice(0, 10).map(d => d.value), backgroundColor: dangerC, borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.response_time_histogram && charts.response_time_histogram.length) {
    new Chart(document.getElementById('chart-rt-hist'), {
      type: 'bar',
      data: {
        labels: charts.response_time_histogram.map(d => d.label),
        datasets: [{ label: 'Requests', data: charts.response_time_histogram.map(d => d.value), backgroundColor: '#14b8a6', borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.duration_histogram && charts.duration_histogram.length) {
    new Chart(document.getElementById('chart-duration-hist'), {
      type: 'bar',
      data: {
        labels: charts.duration_histogram.map(d => d.label),
        datasets: [{ label: 'Requests', data: charts.duration_histogram.map(d => d.value), backgroundColor: '#14b8a6', borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.bytes_distribution && charts.bytes_distribution.length) {
    new Chart(document.getElementById('chart-bytes'), {
      type: 'bar',
      data: {
        labels: charts.bytes_distribution.map(d => d.label),
        datasets: [{ label: 'Requests', data: charts.bytes_distribution.map(d => d.value), backgroundColor: '#ec4899', borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.rt_scatter && charts.rt_scatter.length) {
    const scatterData = charts.rt_scatter.map(d => ({x: new Date(d.t.replace(' ','T')), y: d.rt}));
    new Chart(document.getElementById('chart-rt-scatter'), {
      type: 'scatter',
      data: {
        datasets: [{
          label: 'Response Time',
          data: scatterData,
          backgroundColor: scatterData.map(d => d.y > 30 ? dangerC : d.y > 10 ? warningC : accentMid),
          pointRadius: 3,
          pointHoverRadius: 5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { type: 'timeseries', time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } }, ticks: { color: tickColor }, grid: { color: gridColor } },
          y: { title: { display: true, text: 'Response Time (s)', color: tickColor }, ticks: { color: tickColor }, grid: { color: gridColor } }
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => ctx.parsed.y.toFixed(3) + 's' } }
        }
      }
    });
  }

  if (charts.endpoint_rt && charts.endpoint_rt.length) {
    new Chart(document.getElementById('chart-endpoint-rt'), {
      type: 'bar',
      data: {
        labels: charts.endpoint_rt.map(d => d.label.length > 30 ? d.label.slice(0, 30) + '…' : d.label),
        datasets: [
          { label: 'Avg RT', data: charts.endpoint_rt.map(d => d.avg), backgroundColor: accentMid, borderRadius: 4 },
          { label: 'P95 RT', data: charts.endpoint_rt.map(d => d.p95), backgroundColor: warningC, borderRadius: 4 },
          { label: 'Max RT', data: charts.endpoint_rt.map(d => d.max), backgroundColor: dangerC, borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { ticks: { color: tickColor, font: { size: 10 } }, grid: { display: false } },
          y: { title: { display: true, text: 'Seconds', color: tickColor }, ticks: { color: tickColor }, grid: { color: gridColor } }
        },
        plugins: { legend: { position: 'top', labels: { color: tickColor, padding: 10, usePointStyle: true, pointStyle: 'rectRounded' } } }
      }
    });
  }

  if (report.upstream_timing) {
    const ut = report.upstream_timing;
    const labels = ['RT (Total)', 'URT (Upstream)', 'UHT (Header)', 'UCT (Connect)'];
    const avgData = [ut.rt?.avg, ut.urt?.avg, ut.uht?.avg, ut.uct?.avg];
    const p95Data = [ut.rt?.p95, ut.urt?.p95, ut.uht?.p95, ut.uct?.p95];
    if (avgData.some(v => v != null)) {
      new Chart(document.getElementById('chart-upstream'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Avg', data: avgData, backgroundColor: accentMid, borderRadius: 4 },
            { label: 'P95', data: p95Data, backgroundColor: warningC, borderRadius: 4 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { ticks: { color: tickColor }, grid: { display: false } },
            y: { title: { display: true, text: 'Seconds', color: tickColor }, ticks: { color: tickColor }, grid: { color: gridColor } }
          },
          plugins: { legend: { position: 'top', labels: { color: tickColor, padding: 10, usePointStyle: true, pointStyle: 'rectRounded' } } }
        }
      });
    }
  }
}
</script>

          </div>
          <div class="bg-dark-800 rounded-xl border border-dark-600 shadow-lg p-6 sm:p-8">

                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                    </svg>
                    <p class="text-gray-400 text-sm">Drop a log file here or click to browse</p>
                    <p class="text-gray-600 text-xs mt-1">Supports .log, .txt, .gz, or any text file (max 50MB)</p>
                  </div>
                </template>
                <template x-if="file">
                  <div class="flex items-center justify-center gap-3">
                    <svg class="w-6 h-6 text-accent-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

                      <p class="text-white text-sm font-medium" x-text="file.name"></p>

                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="inputMode==='paste'">
              <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">Log Content</label>

            </template>

            <div class="flex items-end gap-4 mb-4">

                  <option value="nginx_access">Nginx Access</option>
                  <option value="nginx_error">Nginx Error</option>
                  <option value="container">Container</option>
                  <option value="syslog">Syslog</option>
                  <option value="api_backend">API Backend</option>
                </select>
              </div>
            </div>

            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-300 mb-2">Exclude IPs <span class="text-gray-500 font-normal">(optional)</span></label>

                class="w-full px-4 py-2.5 rounded-lg bg-dark-700 border border-dark-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm">

            </div>

            <button @click="analyze()" :disabled="!file && !pasteContent.trim()" class="w-full py-3 px-4 rounded-lg bg-accent-500 hover:bg-accent-600 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold transition text-sm flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              Analyze Logs
            </button>
          </div>
        </div>
      </template>

      <template x-if="view === 'processing'">
        <div class="fade-in flex flex-col items-center justify-center py-32">
          <template x-if="uploadProgress >= 0">
            <div class="w-64 mb-4">

                <span x-text="uploadProgress + '%'"></span>
              </div>

                <div class="bg-accent-500 h-2 rounded-full transition-all duration-200" :style="'width:' + uploadProgress + '%'"></div>
              </div>
            </div>
          </template>
          <template x-if="uploadProgress < 0">

          </template>
          <p class="text-white font-semibold text-lg">Analyzing logs...</p>

      </template>

      <template x-if="view === 'report' && report">
        <div class="fade-in space-y-6">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>

              <div class="flex flex-wrap items-center gap-2 mt-2">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-accent-500/20 text-accent-400 border border-accent-500/20" x-text="report.log_type_label || report.log_type || 'unknown'"></span>
                <template x-if="report.summary && report.summary.health">
                  <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium border"
                    :class="{
                      'bg-success/15 text-success border-success/20': report.summary.health === 'healthy',
                      'bg-warning/15 text-warning border-warning/20': report.summary.health === 'degraded',
                      'bg-danger/15 text-danger border-danger/20': report.summary.health === 'critical',
                    }">
                    <span class="w-1.5 h-1.5 rounded-full" :class="{'bg-success': report.summary.health==='healthy', 'bg-warning': report.summary.health==='degraded', 'bg-danger': report.summary.health==='critical'}"></span>
                    <span x-text="report.summary.health === 'healthy' ? 'Healthy' : report.summary.health === 'degraded' ? 'Degraded' : 'Critical'"></span>
                  </span>
                </template>
                <template x-if="report.summary && report.summary.incident_count > 0">
                  <span class="text-xs text-warning" x-text="report.summary.incident_count + ' incident(s) detected'"></span>
                </template>
                <template x-if="report.time_range && report.time_range.start">
                  <span class="text-xs text-gray-500" x-text="report.time_range.start + ' — ' + report.time_range.end"></span>

                <template x-if="report.processing_ms != null">
                  <span class="text-xs text-gray-500" x-text="'Parsed in ' + report.processing_ms + 'ms'"></span>
                </template>
                <template x-if="report.parsed != null">
                  <span class="text-xs text-gray-500" x-text="report.parsed + ' of ' + report.total_lines + ' entries'"></span>
                </template>
                <template x-if="report.parse_errors > 0">
                  <span class="text-xs text-warning" x-text="report.parse_errors + ' parse errors'"></span>
                </template>
                <template x-if="report.excluded_ips && report.excluded_ips.length">
                  <span class="text-xs text-gray-400" x-text="'Excluded: ' + report.excluded_ips.join(', ')"></span>
                </template>
              </div>
            </div>
            <div class="flex flex-wrap gap-2 shrink-0">

                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

                <svg x-show="pdfExporting" class="animate-spin h-3.5 w-3.5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                <span x-text="pdfExporting ? 'Generating...' : 'Export PDF'"></span>
              </button>
            </div>
          </div>

          <template x-if="pdfError">

              <svg class="w-3.5 h-3.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l6.518 11.6c.75 1.334-.213 2.98-1.742 2.98H3.48c-1.53 0-2.492-1.646-1.743-2.98l6.518-11.6zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
              <span x-text="pdfError"></span>
            </div>
          </template>

          <div id="report-content" class="space-y-6">
          <template x-if="report.summary">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
              <template x-for="card in [
                { show: report.summary.total_requests != null, label: report.log_type === 'nginx_access' ? 'Total Requests' : 'Total Lines', value: formatNum(report.summary.total_requests), icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' },
                { show: report.summary.unique_ips != null, label: 'Unique IPs', value: formatNum(report.summary.unique_ips), icon: 'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9' },
                { show: report.summary.unique_paths != null, label: 'Unique Paths', value: formatNum(report.summary.unique_paths), icon: 'M4 6h16M4 10h16M4 14h16M4 18h16' },
                { show: report.summary.total_bytes != null, label: 'Total Transfer', value: formatBytes(report.summary.total_bytes), icon: 'M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12' },
                { show: report.summary.error_rate != null && report.summary.error_rate > 0, label: 'Error Rate', value: formatPct(report.summary.error_rate), icon: 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z', cls: report.summary.error_rate > 5 ? 'text-danger' : report.summary.error_rate > 1 ? 'text-warning' : '' },
                { show: report.summary.count != null && report.log_type !== 'nginx_access', label: 'Log Lines', value: formatNum(report.summary.count), icon: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
                { show: report.summary.count != null && report.log_type === 'nginx_access', label: 'Requests', value: formatNum(report.summary.count), icon: 'M13 10V3L4 14h7v7l9-11h-7z' },
                { show: report.summary.p50 != null, label: 'Median RT', value: report.summary.p50 + 's', icon: 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' },
                { show: report.summary.p95 != null, label: 'P95 Response Time', value: report.summary.p95 + 's', icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', cls: report.summary.p95 > 30 ? 'text-danger' : report.summary.p95 > 10 ? 'text-warning' : '' },
                { show: report.summary.p99 != null, label: 'P99 Response Time', value: report.summary.p99 + 's', icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', cls: report.summary.p99 > 30 ? 'text-danger' : report.summary.p99 > 10 ? 'text-warning' : '' },
                { show: report.summary.avg != null, label: 'Avg Response Time', value: report.summary.avg + 's', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
                { show: report.summary.max != null, label: 'Max Response Time', value: report.summary.max + 's', icon: 'M13 17h8m0 0V9m0 8l-8-8-4 4-6-6', cls: report.summary.max > 30 ? 'text-danger' : report.summary.max > 10 ? 'text-warning' : '' },
              ].filter(c => c.show)" :key="card.label">
                <div class="bg-dark-800 border border-dark-600 rounded-xl p-4">
                  <p class="text-xs text-gray-500 uppercase tracking-wider mb-1" x-text="card.label"></p>
                  <p class="text-xl font-bold text-white" :class="card.cls || ''" x-text="card.value"></p>
                </div>
              </template>
            </div>
          </template>

          <template x-if="report.charts && report.charts.hourly_timeline && report.charts.hourly_timeline.length">
            <div class="bg-dark-800 border border-dark-600 rounded-xl p-5">

              <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
                <div class="bg-dark-700 rounded-lg p-3 border border-dark-600">
                  <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Peak Hour</p>
                  <p class="text-lg font-bold text-white" x-text="(() => { const h = report.charts.hourly_timeline.reduce((a,b) => b.value > a.value ? b : a, {value:-1}); return h.label || '—'; })()"></p>
                  <p class="text-xs text-accent-400" x-text="(() => { const h = report.charts.hourly_timeline.reduce((a,b) => b.value > a.value ? b : a, {value:-1}); return h.value != null ? h.value.toLocaleString() + ' requests' : ''; })()"></p>
                </div>
                <div class="bg-dark-700 rounded-lg p-3 border border-dark-600">
                  <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Quietest Hour</p>
                  <p class="text-lg font-bold text-white" x-text="(() => { const h = report.charts.hourly_timeline.filter(d => d.value > 0).reduce((a,b) => b.value < a.value ? b : a, {value:Infinity}); return h.label || '—'; })()"></p>
                  <p class="text-xs text-gray-400" x-text="(() => { const h = report.charts.hourly_timeline.filter(d => d.value > 0).reduce((a,b) => b.value < a.value ? b : a, {value:Infinity}); return h.value != null && h.value !== Infinity ? h.value.toLocaleString() + ' requests' : ''; })()"></p>
                </div>
                <div class="bg-dark-700 rounded-lg p-3 border border-dark-600">
                  <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Avg / Hour</p>
                  <p class="text-lg font-bold text-white" x-text="(() => { const h = report.charts.hourly_timeline; const total = h.reduce((s,d) => s + d.value, 0); return h.length ? Math.round(total / h.length).toLocaleString() : '—'; })()"></p>

                <div class="bg-dark-700 rounded-lg p-3 border border-dark-600">
                  <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Active Hours</p>
                  <p class="text-lg font-bold text-white" x-text="report.charts.hourly_timeline.filter(d => d.value > 0).length + ' / ' + report.charts.hourly_timeline.length"></p>
                </div>
              </div>
              <div class="relative" style="height:280px"><canvas id="chart-timeline" data-chart></canvas></div>
            </div>
          </template>

          <template x-if="report.upstream_timing && report.log_type === 'nginx_access'">

                  <div class="relative" style="height:300px"><canvas id="chart-rt-scatter" data-chart></canvas></div>
                </div>
                <div class="bg-dark-800 border border-dark-600 rounded-xl p-5">
                  <h4 class="text-sm font-medium text-gray-300 mb-3">Endpoint Response Time Comparison</h4>
                  <div class="relative" style="height:300px"><canvas id="chart-endpoint-rt" data-chart></canvas></div>

                  <div class="relative" style="height:260px"><canvas id="chart-upstream" data-chart></canvas></div>
                </div>
              </div>
            </div>
          </template>

                  <div class="relative" style="height:260px"><canvas id="chart-status" data-chart></canvas></div>
                </div>

                  <h4 class="text-sm font-medium text-gray-300 mb-3">Level Distribution</h4>
                  <div class="relative" style="height:260px"><canvas id="chart-levels" data-chart></canvas></div>
                </div>
                <div x-show="report.charts.method_distribution" class="bg-dark-800 border border-dark-600 rounded-xl p-5">
                  <h4 class="text-sm font-medium text-gray-300 mb-3">Method Distribution</h4>
                  <div class="relative" style="height:260px"><canvas id="chart-methods" data-chart></canvas></div>
                </div>
                <div x-show="report.charts.process_distribution" class="bg-dark-800 border border-dark-600 rounded-xl p-5">
                  <h4 class="text-sm font-medium text-gray-300 mb-3">Process Distribution</h4>
                  <div class="relative" style="height:260px"><canvas id="chart-processes" data-chart></canvas></div>
                </div>

                  <div class="relative" style="height:260px"><canvas id="chart-streams" data-chart></canvas></div>
                </div>
                <div x-show="report.charts.top_endpoints" class="bg-dark-800 border border-dark-600 rounded-xl p-5">
                  <h4 class="text-sm font-medium text-gray-300 mb-3">Top Endpoints</h4>
                  <div class="relative" style="height:260px"><canvas id="chart-endpoints" data-chart></canvas></div>
                </div>
                <div x-show="report.charts.top_ips" class="bg-dark-800 border border-dark-600 rounded-xl p-5">
                  <h4 class="text-sm font-medium text-gray-300 mb-3">Top IPs</h4>
                  <div class="relative" style="height:260px"><canvas id="chart-ips" data-chart></canvas></div>
                </div>
                <div x-show="report.charts.top_source_ips" class="bg-dark-800 border border-dark-600 rounded-xl p-5">
                  <h4 class="text-sm font-medium text-gray-300 mb-3">Top Source IPs</h4>
                  <div class="relative" style="height:260px"><canvas id="chart-source-ips" data-chart></canvas></div>

                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Levels</h4></div>
                  <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Level</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Count</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Percentage</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="row in report.tables.levels" :key="row.level">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5">
                              <span class="inline-flex px-1.5 py-0.5 rounded text-xs font-medium"
                                :class="{
                                  'bg-danger/15 text-danger': ['error','fatal','critical','crit','emerg','alert'].includes((row.level||'').toLowerCase()),
                                  'bg-warning/15 text-warning': ['warn','warning'].includes((row.level||'').toLowerCase()),
                                  'bg-success/15 text-success': ['info','notice'].includes((row.level||'').toLowerCase()),
                                  'bg-accent-500/15 text-accent-400': ['debug','trace'].includes((row.level||'').toLowerCase()),
                                  'bg-dark-700 text-gray-300': !['error','fatal','critical','crit','emerg','alert','warn','warning','info','notice','debug','trace'].includes((row.level||'').toLowerCase()),
                                }" x-text="row.level"></span>
                            </td>
                            <td class="px-5 py-2.5 text-gray-300" x-text="formatNum(row.count)"></td>
                            <td class="px-5 py-2.5 text-gray-400" x-text="formatPct(row.pct)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.processes">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Processes</h4></div>
                  <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Process</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Count</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Percentage</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="row in report.tables.processes" :key="row.process">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-accent-400 font-mono text-xs" x-text="row.process"></td>
                            <td class="px-5 py-2.5 text-gray-300" x-text="formatNum(row.count)"></td>
                            <td class="px-5 py-2.5 text-gray-400" x-text="formatPct(row.pct)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.top_clients">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Top Clients</h4></div>
                  <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Client</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Count</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Percentage</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="row in report.tables.top_clients" :key="row.client">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-accent-400 font-mono text-xs" x-text="row.client"></td>
                            <td class="px-5 py-2.5 text-gray-300" x-text="formatNum(row.count)"></td>
                            <td class="px-5 py-2.5 text-gray-400" x-text="formatPct(row.pct)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.top_messages">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Top Messages</h4></div>
                  <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Message</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Count</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="(row, idx) in report.tables.top_messages.slice(0, 20)" :key="idx">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-gray-300 text-xs max-w-lg truncate" x-text="row.message" :title="row.message"></td>
                            <td class="px-5 py-2.5 text-gray-300" x-text="formatNum(row.count)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.error_samples && report.tables.error_samples.length">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Error Samples</h4></div>
                  <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Timestamp</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Level</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Message</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="(row, idx) in report.tables.error_samples.slice(0, 25)" :key="idx">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-gray-500 text-xs whitespace-nowrap" x-text="row.timestamp || '—'"></td>
                            <td class="px-5 py-2.5">
                              <template x-if="row.level">
                                <span class="inline-flex px-1.5 py-0.5 rounded text-xs font-medium"
                                  :class="{
                                    'bg-danger/15 text-danger': (row.level||'').match(/error|crit|emerg|fatal/i),
                                    'bg-warning/15 text-warning': (row.level||'').match(/warn/i),
                                    'bg-accent-500/15 text-accent-400': !(row.level||'').match(/error|crit|emerg|fatal|warn/i),
                                  }" x-text="row.level"></span>
                              </template>
                              <template x-if="!row.level"><span class="text-gray-600 text-xs">—</span></template>
                            </td>
                            <td class="px-5 py-2.5 text-gray-300 text-xs max-w-md truncate" x-text="row.message || '—'" :title="row.message"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.auth_failures_detail && report.tables.auth_failures_detail.length">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Auth Failure Details</h4></div>
                  <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Timestamp</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Source IP</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Message</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="(row, idx) in report.tables.auth_failures_detail.slice(0, 30)" :key="idx">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-gray-500 text-xs whitespace-nowrap" x-text="row.timestamp || '—'"></td>
                            <td class="px-5 py-2.5 text-accent-400 font-mono text-xs" x-text="row.source_ip || '—'"></td>
                            <td class="px-5 py-2.5 text-gray-300 text-xs" x-text="row.user || '—'"></td>
                            <td class="px-5 py-2.5 text-gray-400 text-xs max-w-md truncate" x-text="row.message || '—'" :title="row.message"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.top_source_ips">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Top Source IPs</h4></div>
                  <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">IP</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Count</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="row in report.tables.top_source_ips" :key="row.ip">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-accent-400 font-mono text-xs" x-text="row.ip"></td>
                            <td class="px-5 py-2.5 text-gray-300" x-text="formatNum(row.count)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>
            </div>
          </template>
          </div>
        </div>
      </template>
    </main>

    <footer class="border-t border-dark-600 py-4">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-gray-600">LogLens v1.0 &mdash; Internal Use Only</div>
    </footer>
  </div>
</div>
</div>

<div x-show="toastMessage" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
  class="fixed bottom-4 right-4 z-50 max-w-sm px-4 py-3 rounded-lg shadow-lg border text-sm flex items-center gap-2"
  :class="{'bg-accent-500/10 border-accent-500/30 text-accent-400': toastType==='info', 'bg-success/10 border-success/30 text-success': toastType==='success', 'bg-warning/10 border-warning/30 text-warning': toastType==='warning', 'bg-danger/10 border-danger/30 text-danger': toastType==='error'}">
  <span x-text="toastMessage"></span>
</div>

</body>
</html>
