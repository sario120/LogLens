                <div class="bg-dark-800 border border-dark-600 rounded-xl p-4">
                  <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Total Events</p>
                  <p class="text-xl font-bold text-accent-400" x-text="correlationData.total_events.toLocaleString()"></p>
                </div>
              </div>

              <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                <div class="px-5 py-3 border-b border-dark-600">
                  <h3 class="text-sm font-medium text-gray-300">Event Timeline</h3>
                </div>
                <div class="overflow-x-auto table-scroll max-h-[600px] overflow-y-auto">
                  <table class="w-full text-sm">
                    <thead class="sticky top-0"><tr class="border-b border-dark-600" style="background:var(--c-surface-raised)">
                      <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 uppercase">Timestamp</th>
                      <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 uppercase">Source</th>
                      <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                      <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 uppercase">Summary</th>
                    </tr></thead>
                    <tbody>
                      <template x-for="(ev, idx) in correlationData.timeline.slice(0, rowLimit('correlation_timeline'))" :key="idx">
                        <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                          <td class="px-4 py-2.5 text-accent-400 font-mono text-xs whitespace-nowrap" x-text="ev.timestamp"></td>
                          <td class="px-4 py-2.5 text-gray-300 text-xs" x-text="ev.source"></td>
                          <td class="px-4 py-2.5">
                            <span class="inline-flex px-2 py-0.5 rounded text-xs font-medium"
                              :class="{
                                'bg-accent-500/15 text-accent-400': ev.type === 'nginx_access',
                                'bg-danger/15 text-danger': ev.type === 'nginx_error',
                                'bg-success/15 text-success': ev.type === 'syslog',
                                'bg-warning/15 text-warning': ev.type === 'container',
                                'bg-blue-500/15 text-blue-400': ev.type === 'api_backend',
                                'bg-purple-500/15 text-purple-400': ev.type === 'postgres',
                              }" x-text="ev.type.replace('_', ' ')"></span>
                          </td>
                          <td class="px-4 py-2.5 text-gray-400 text-xs max-w-md truncate" x-text="ev.summary" :title="ev.summary"></td>
                        </tr>
                      </template>
                    </tbody>
                    <template x-if="correlationData.timeline.length > rowLimit('correlation_timeline')">
                      <tfoot><tr><td colspan="4" class="text-center py-2">
                        <button @click="showMoreRows('correlation_timeline')" class="px-3 py-1 text-xs rounded bg-dark-700 border border-dark-600 text-gray-400 hover:text-accent-400 hover:border-accent-500/30 transition">Show more</button>
                        <button @click="showAllRows('correlation_timeline')" class="px-3 py-1 text-xs rounded bg-dark-700 border border-dark-600 text-gray-400 hover:text-accent-400 hover:border-accent-500/30 transition ml-2"><span x-text="'Show all (' + correlationData.timeline.length + ')'"></span></button>
                      </td></tr></tfoot>
                    </template>
                  </table>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>
    </main>

    <footer class="border-t py-4" style="border-color:var(--c-border);padding-bottom:env(safe-area-inset-bottom, 0)">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs" style="color:var(--c-text-muted)">LogLens v1.0 &mdash; Internal Use Only</div>
    </footer>
  </div>
</div>
</div>

    <div x-show="toastMessage" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
  id="toast-container"
  aria-live="polite" role="status"
  class="fixed bottom-4 right-4 z-50 max-w-sm px-4 py-3 rounded-lg shadow-lg border text-sm flex items-center gap-2"
  :class="{'bg-accent-500/10 border-accent-500/30 text-accent-400': toastType==='info', 'bg-success/10 border-success/30 text-success': toastType==='success', 'bg-warning/10 border-warning/30 text-warning': toastType==='success', 'bg-danger/10 border-danger/30 text-danger': toastType==='error'}">
  <span x-text="toastMessage"></span>
</div>

<div x-show="contextPanel || contextLoading || contextError" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
  class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center"
  @click.self="closeContext()">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
  <div class="relative w-full max-w-2xl max-h-[80vh] mx-4 mb-4 sm:mb-0 bg-dark-800 border border-dark-600 rounded-2xl shadow-2xl overflow-hidden flex flex-col fade-in"
    @click.stop>
    <div class="flex items-center justify-between px-5 py-3 border-b border-dark-600">
      <h3 class="text-sm font-semibold text-gray-300 flex items-center gap-2">
        <svg class="w-4 h-4" style="color:var(--c-accent-mid)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        Context View
      </h3>
      <button @click="closeContext()" class="text-gray-500 hover:text-white transition p-1 rounded-lg hover:bg-dark-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-5">
      <template x-if="contextLoading">
        <div class="flex flex-col items-center py-12">
          <div class="spinner mb-4"></div>
          <p class="text-gray-400 text-sm">Loading context...</p>
        </div>
      </template>
      <template x-if="contextError">
        <div class="text-center py-12">
          <p class="text-danger text-sm" x-text="contextError"></p>
          <button @click="closeContext()" class="mt-3 px-4 py-2 rounded-lg bg-dark-700 border border-dark-600 text-gray-300 hover:text-white transition text-sm">Close</button>
        </div>
      </template>
      <template x-if="contextPanel && !contextLoading && !contextError">
        <div>
          <p class="text-xs text-gray-500 mb-3" x-text="'Line ' + (contextPanel.center_line + 1) + ' (showing surrounding context)'"></p>
          <div class="font-mono text-xs leading-relaxed rounded-lg overflow-hidden border border-dark-600" style="background:var(--c-surface)">
            <template x-for="(line, idx) in contextPanel.context" :key="idx">
              <div class="flex" :class="line.is_match ? 'bg-accent-500/10 border-l-2 border-accent-500' : 'border-l-2 border-transparent'">
                <span class="px-3 py-1 text-right select-none shrink-0 w-12" :class="line.is_match ? 'text-accent-400' : 'text-gray-600'" x-text="line.line_num + 1"></span>
                <span class="px-3 py-1 flex-1 whitespace-pre-wrap break-all" :class="line.is_match ? 'text-white font-medium' : 'text-gray-400'" x-text="line.content"></span>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

</body>
</html>
