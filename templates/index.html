<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogLens</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        dark: { 900: '#0a0e17', 800: '#111827', 700: '#1a2234', 600: '#243049' },
        accent: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' },
        success: '#22c55e', warning: '#f59e0b', danger: '#ef4444',
      }
    }
  }
}
</script>
<style>
*{scrollbar-width:thin;scrollbar-color:#243049 #111827}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-track{background:#111827}
*::-webkit-scrollbar-thumb{background:#243049;border-radius:3px}
.drag-active{border-color:#3b82f6!important;background:rgba(59,130,246,.08)!important}
.spinner{border:3px solid #1a2234;border-top-color:#3b82f6;border-radius:50%;width:40px;height:40px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tab-active{background:#243049;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
[x-cloak]{display:none!important}
@media print {
  body { background: #0a0e17 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .bg-dark-800, .bg-dark-700 { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  button, .spinner { display: none !important; }
  #report-content { break-inside: avoid; }
  canvas[data-chart] { max-width: 100% !important; }
}
</style>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js?v=2"></script>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen font-sans">

<script>
document.addEventListener('alpine:init', () => {
  Alpine.store('auth', {
    token: null,
    loggedIn: false,
    async login(apiKey) {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({api_key: apiKey})
      });
      if (!res.ok) throw new Error('Invalid key');
      const data = await res.json();
      this.token = data.token;
      this.loggedIn = true;
    },
    logout() { this.token = null; this.loggedIn = false; },
  });

  Alpine.data('analyzer', () => ({
    view: 'upload',
    inputMode: 'file',
    logType: 'auto',
    excludeIps: '',
    report: null,
    error: null,
    file: null,
    pasteContent: '',
    dragOver: false,
    pdfExporting: false,

    async analyze() {
      this.view = 'processing';
      this.error = null;
      try {
        let res;
        if (this.file) {
          const fd = new FormData();
          fd.append('file', this.file);
          fd.append('log_type', this.logType);
          fd.append('exclude_ips', this.excludeIps);
          res = await fetch('/api/analyze', {
            method: 'POST', headers: {'Authorization': 'Bearer ' + Alpine.store('auth').token}, body: fd
          });
        } else if (this.pasteContent.trim()) {
          res = await fetch('/api/analyze', {
            method: 'POST',
            headers: {'Authorization': 'Bearer ' + Alpine.store('auth').token, 'Content-Type': 'application/json'},
            body: JSON.stringify({content: this.pasteContent, log_type: this.logType, exclude_ips: this.excludeIps})
          });
        } else {
          throw new Error('No content provided');
        }
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Analysis failed'); }
        this.report = await res.json();
        if (this.report.error) throw new Error(this.report.error);
        this.view = 'report';
        this.$nextTick(() => renderCharts(this.report));
      } catch(e) {
        this.error = e.message;
        this.view = 'upload';
      }
    },
    reset() { this.view = 'upload'; this.report = null; this.error = null; this.file = null; this.pasteContent = ''; this.logType = 'auto'; this.excludeIps = ''; },
    exportJson() {
      if (!this.report) return;
      const blob = new Blob([JSON.stringify(this.report, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `loglens-report-${this.report.log_type}-${Date.now()}.json`;
      a.click(); URL.revokeObjectURL(url);
    },
    async exportPdf() {
      if (!this.report) return;
      this.pdfExporting = true;
      await this.$nextTick();
      await new Promise(r => setTimeout(r, 800));
      const el = document.getElementById('report-content');
      if (!el) { this.pdfExporting = false; return; }
      if (typeof html2pdf === 'undefined') {
        this.pdfExporting = false;
        window.print();
        return;
      }
      el.querySelectorAll('canvas[data-chart]').forEach(c => {
        if (c.width === 0 || c.height === 0) return;
        try {
          const img = document.createElement('img');
          img.src = c.toDataURL('image/png');
          img.style.cssText = 'width:100%;height:auto;max-height:280px;';
          img.setAttribute('data-chart-img', '1');
          c.parentNode.replaceChild(img, c);
        } catch(e) {}
      });
      const opt = {
        margin: [10, 10, 10, 10],
        filename: `loglens-report-${this.report.log_type}-${Date.now()}.pdf`,
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#0a0e17', windowWidth: 1200 },
        jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape' },
        pagebreak: { mode: ['avoid-all', 'css'] },
      };
      try {
        await html2pdf().set(opt).from(el).save();
      } catch(e) { console.error('PDF export failed:', e); window.print(); }
      this.pdfExporting = false;
      this.$nextTick(() => renderCharts(this.report));
    },
    formatBytes(b) {
      if (b == null) return '\u2014';
      for (const u of ['B','KB','MB','GB','TB']) { if (Math.abs(b) < 1024) return b.toFixed(b < 10 && u !== 'B' ? 2 : 0) + ' ' + u; b /= 1024; }
      return b.toFixed(2) + ' PB';
    },
    formatNum(v) { return v != null ? Number(v).toLocaleString() : '\u2014'; },
    formatPct(v) { return v != null ? v + '%' : '\u2014'; },
    formatMs(v) { return v != null ? v + 's' : '\u2014'; },
    formatMsMs(v) { return v != null ? v + 'ms' : '\u2014'; }
  }));
});
</script>

<script>
function renderCharts(report) {
  const charts = report.charts || {};
  document.querySelectorAll('canvas[data-chart]').forEach(c => {
    const existing = Chart.getChart(c);
    if (existing) existing.destroy();
  });

  const doughnutOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af', padding: 12 } } } };
  const barOpts = (horizontal) => ({
    indexAxis: horizontal ? 'y' : 'x',
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      x: { ticks: { color: '#9ca3af' }, grid: { color: '#1f2937' } },
      y: { ticks: { color: '#9ca3af', font: { size: 11 } }, grid: { display: false } }
    },
    plugins: { legend: { display: false } }
  });

  if (charts.status_distribution) {
    new Chart(document.getElementById('chart-status'), {
      type: 'doughnut',
      data: {
        labels: charts.status_distribution.map(d => d.label),
        datasets: [{ data: charts.status_distribution.map(d => d.value), backgroundColor: ['#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#6366f1','#14b8a6'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.level_distribution) {
    new Chart(document.getElementById('chart-levels'), {
      type: 'doughnut',
      data: {
        labels: charts.level_distribution.map(d => d.label),
        datasets: [{ data: charts.level_distribution.map(d => d.value), backgroundColor: ['#22c55e','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#6b7280'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.method_distribution) {
    new Chart(document.getElementById('chart-methods'), {
      type: 'doughnut',
      data: {
        labels: charts.method_distribution.map(d => d.label),
        datasets: [{ data: charts.method_distribution.map(d => d.value), backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#6366f1'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.process_distribution) {
    new Chart(document.getElementById('chart-processes'), {
      type: 'doughnut',
      data: {
        labels: charts.process_distribution.map(d => d.label),
        datasets: [{ data: charts.process_distribution.map(d => d.value), backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#6366f1','#14b8a6','#ec4899'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.stream_distribution) {
    new Chart(document.getElementById('chart-streams'), {
      type: 'doughnut',
      data: {
        labels: charts.stream_distribution.map(d => d.label),
        datasets: [{ data: charts.stream_distribution.map(d => d.value), backgroundColor: ['#3b82f6','#ef4444'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.hourly_timeline) {
    new Chart(document.getElementById('chart-timeline'), {
      type: 'bar',
      data: {
        labels: charts.hourly_timeline.map(d => d.label),
        datasets: [{ label: 'Count', data: charts.hourly_timeline.map(d => d.value), backgroundColor: '#3b82f6', borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.top_endpoints) {
    new Chart(document.getElementById('chart-endpoints'), {
      type: 'bar',
      data: {
        labels: charts.top_endpoints.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_endpoints.slice(0, 10).map(d => d.value), backgroundColor: '#6366f1', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_ips) {
    new Chart(document.getElementById('chart-ips'), {
      type: 'bar',
      data: {
        labels: charts.top_ips.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_ips.slice(0, 10).map(d => d.value), backgroundColor: '#22c55e', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_source_ips) {
    new Chart(document.getElementById('chart-source-ips'), {
      type: 'bar',
      data: {
        labels: charts.top_source_ips.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_source_ips.slice(0, 10).map(d => d.value), backgroundColor: '#ef4444', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_targeted_users) {
    new Chart(document.getElementById('chart-targeted-users'), {
      type: 'bar',
      data: {
        labels: charts.top_targeted_users.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_targeted_users.slice(0, 10).map(d => d.value), backgroundColor: '#f59e0b', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_clients) {
    new Chart(document.getElementById('chart-clients'), {
      type: 'bar',
      data: {
        labels: charts.top_clients.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_clients.slice(0, 10).map(d => d.value), backgroundColor: '#f59e0b', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_messages && charts.top_messages.length) {
    new Chart(document.getElementById('chart-top-messages'), {
      type: 'bar',
      data: {
        labels: charts.top_messages.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_messages.slice(0, 10).map(d => d.value), backgroundColor: '#8b5cf6', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.top_errors && charts.top_errors.length) {
    new Chart(document.getElementById('chart-errors'), {
      type: 'bar',
      data: {
        labels: charts.top_errors.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.top_errors.slice(0, 10).map(d => d.value), backgroundColor: '#ef4444', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.auth_fail_messages && charts.auth_fail_messages.length) {
    new Chart(document.getElementById('chart-auth-fails'), {
      type: 'bar',
      data: {
        labels: charts.auth_fail_messages.slice(0, 10).map(d => d.label),
        datasets: [{ data: charts.auth_fail_messages.slice(0, 10).map(d => d.value), backgroundColor: '#ef4444', borderRadius: 4 }]
      },
      options: barOpts(true)
    });
  }

  if (charts.response_time_histogram && charts.response_time_histogram.length) {
    new Chart(document.getElementById('chart-rt-hist'), {
      type: 'bar',
      data: {
        labels: charts.response_time_histogram.map(d => d.label),
        datasets: [{ label: 'Requests', data: charts.response_time_histogram.map(d => d.value), backgroundColor: '#14b8a6', borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.duration_histogram && charts.duration_histogram.length) {
    new Chart(document.getElementById('chart-duration-hist'), {
      type: 'bar',
      data: {
        labels: charts.duration_histogram.map(d => d.label),
        datasets: [{ label: 'Requests', data: charts.duration_histogram.map(d => d.value), backgroundColor: '#14b8a6', borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.bytes_distribution && charts.bytes_distribution.length) {
    new Chart(document.getElementById('chart-bytes'), {
      type: 'bar',
      data: {
        labels: charts.bytes_distribution.map(d => d.label),
        datasets: [{ label: 'Requests', data: charts.bytes_distribution.map(d => d.value), backgroundColor: '#ec4899', borderRadius: 4 }]
      },
      options: barOpts(false)
    });
  }

  if (charts.rt_scatter && charts.rt_scatter.length) {
    const scatterData = charts.rt_scatter.map(d => ({x: new Date(d.t.replace(' ','T')), y: d.rt}));
    new Chart(document.getElementById('chart-rt-scatter'), {
      type: 'scatter',
      data: {
        datasets: [{
          label: 'Response Time',
          data: scatterData,
          backgroundColor: scatterData.map(d => d.y > 30 ? '#ef4444' : d.y > 10 ? '#f59e0b' : '#3b82f6'),
          pointRadius: 3,
          pointHoverRadius: 5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { type: 'timeseries', time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } }, ticks: { color: '#9ca3af' }, grid: { color: '#1f2937' } },
          y: { title: { display: true, text: 'Response Time (s)', color: '#9ca3af' }, ticks: { color: '#9ca3af' }, grid: { color: '#1f2937' } }
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => ctx.parsed.y.toFixed(3) + 's' } }
        }
      }
    });
  }

  if (charts.endpoint_rt && charts.endpoint_rt.length) {
    new Chart(document.getElementById('chart-endpoint-rt'), {
      type: 'bar',
      data: {
        labels: charts.endpoint_rt.map(d => d.label.length > 30 ? d.label.slice(0, 30) + '…' : d.label),
        datasets: [
          { label: 'Avg RT', data: charts.endpoint_rt.map(d => d.avg), backgroundColor: '#3b82f6', borderRadius: 4 },
          { label: 'P95 RT', data: charts.endpoint_rt.map(d => d.p95), backgroundColor: '#f59e0b', borderRadius: 4 },
          { label: 'Max RT', data: charts.endpoint_rt.map(d => d.max), backgroundColor: '#ef4444', borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { ticks: { color: '#9ca3af', font: { size: 10 } }, grid: { display: false } },
          y: { title: { display: true, text: 'Seconds', color: '#9ca3af' }, ticks: { color: '#9ca3af' }, grid: { color: '#1f2937' } }
        },
        plugins: { legend: { position: 'top', labels: { color: '#9ca3af', padding: 10, usePointStyle: true, pointStyle: 'rectRounded' } } }
      }
    });
  }

  if (report.upstream_timing) {
    const ut = report.upstream_timing;
    const labels = ['RT (Total)', 'URT (Upstream)', 'UHT (Header)', 'UCT (Connect)'];
    const avgData = [ut.rt?.avg, ut.urt?.avg, ut.uht?.avg, ut.uct?.avg];
    const p95Data = [ut.rt?.p95, ut.urt?.p95, ut.uht?.p95, ut.uct?.p95];
    if (avgData.some(v => v != null)) {
      new Chart(document.getElementById('chart-upstream'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Avg', data: avgData, backgroundColor: '#3b82f6', borderRadius: 4 },
            { label: 'P95', data: p95Data, backgroundColor: '#f59e0b', borderRadius: 4 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { ticks: { color: '#9ca3af' }, grid: { display: false } },
            y: { title: { display: true, text: 'Seconds', color: '#9ca3af' }, ticks: { color: '#9ca3af' }, grid: { color: '#1f2937' } }
          },
          plugins: { legend: { position: 'top', labels: { color: '#9ca3af', padding: 10, usePointStyle: true, pointStyle: 'rectRounded' } } }
        }
      });
    }
  }
}
</script>

<div x-data="">

<div x-show="!$store.auth.loggedIn" x-cloak class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-dark-700 border border-dark-600 mb-4">
          <svg class="w-8 h-8 text-accent-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight">LogLens</h1>
        <p class="text-gray-400 mt-1 text-sm">Internal Log Analysis Portal</p>
      </div>
      <div class="bg-dark-800 rounded-xl border border-dark-600 shadow-xl p-8" x-data="{ apiKey: '', loginError: '', loading: false }">
        <form @submit.prevent="loginError=''; loading=true; $store.auth.login(apiKey).catch(e => { loginError=e.message; loading=false; })">
          <label class="block text-sm font-medium text-gray-300 mb-2">API Key</label>
          <input type="password" x-model="apiKey" required placeholder="Enter your API key"
            class="w-full px-4 py-3 rounded-lg bg-dark-700 border border-dark-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm">
          <p x-show="loginError" x-text="loginError" class="mt-3 text-sm text-danger"></p>
          <button type="submit" :disabled="loading" class="mt-6 w-full py-3 px-4 rounded-lg bg-accent-500 hover:bg-accent-600 disabled:opacity-50 text-white font-semibold transition text-sm">
            <span x-show="!loading">Sign In</span>
            <span x-show="loading" class="inline-flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              Authenticating...
            </span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div x-show="$store.auth.loggedIn" x-cloak class="min-h-screen flex flex-col" x-data="analyzer">
    <header class="bg-dark-800 border-b border-dark-600 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-lg bg-dark-700 border border-dark-600 flex items-center justify-center">
            <svg class="w-4 h-4 text-accent-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <span class="text-lg font-bold text-white tracking-tight">LogLens</span>
        </div>
        <button @click="$store.auth.logout(); reset()" class="text-sm text-gray-400 hover:text-white transition px-3 py-1.5 rounded-lg hover:bg-dark-700">
          Logout
        </button>
      </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

      <template x-if="view === 'upload'">
        <div class="fade-in max-w-2xl mx-auto">
          <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white">Analyze Logs</h2>
            <p class="text-gray-400 mt-1 text-sm">Upload a log file or paste content directly for analysis.</p>
          </div>
          <div class="bg-dark-800 rounded-xl border border-dark-600 shadow-lg p-6 sm:p-8">
            <template x-if="error">
              <div class="mb-5 p-3 rounded-lg bg-danger/10 border border-danger/20 text-danger text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                <span x-text="error"></span>
              </div>
            </template>

            <div class="flex gap-1 p-1 bg-dark-700 rounded-lg mb-5">
              <button @click="inputMode='file'; file=null" :class="inputMode==='file' ? 'tab-active' : 'text-gray-400 hover:text-gray-200'" class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition">Upload File</button>
              <button @click="inputMode='paste'; file=null" :class="inputMode==='paste' ? 'tab-active' : 'text-gray-400 hover:text-gray-200'" class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition">Paste Logs</button>
            </div>

            <template x-if="inputMode==='file'">
              <div class="mb-5"

                    <template x-if="typeof value !== 'number'">
                      <span x-text="value != null ? value : '—'"></span>
                    </template>
                  </p>
                </div>
              </template>
            </div>

                  <p class="text-xs text-accent-400" x-text="(() => { const h = report.charts.hourly_timeline.reduce((a,b) => b.value > a.value ? b : a, {value:-1}); return h.value != null ? h.value.toLocaleString() + ' requests' : ''; })()"></p>

                                    'bg-accent-500/15 text-accent-400': !(row.level||'').match(/error|crit|emerg|fatal|warn/i),
                                  }" x-text="row.level"></span>
                              </template>
                              <template x-if="!row.level"><span class="text-gray-600 text-xs">—</span></template>
                            </td>
                            <td class="px-5 py-2.5 text-gray-300 text-xs max-w-md truncate" x-text="row.message || '—'" :title="row.message"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.auth_failures_detail && report.tables.auth_failures_detail.length">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Auth Failure Details</h4></div>
                  <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Timestamp</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Source IP</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Message</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="(row, idx) in report.tables.auth_failures_detail.slice(0, 30)" :key="idx">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-gray-500 text-xs whitespace-nowrap" x-text="row.timestamp || '—'"></td>
                            <td class="px-5 py-2.5 text-accent-400 font-mono text-xs" x-text="row.source_ip || '—'"></td>
                            <td class="px-5 py-2.5 text-gray-300 text-xs" x-text="row.user || '—'"></td>
                            <td class="px-5 py-2.5 text-gray-400 text-xs max-w-md truncate" x-text="row.message || '—'" :title="row.message"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>

              <template x-if="report.tables.top_source_ips">
                <div class="bg-dark-800 border border-dark-600 rounded-xl overflow-hidden">
                  <div class="px-5 py-3 border-b border-dark-600"><h4 class="text-sm font-medium text-gray-300">Top Source IPs</h4></div>
                  <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                      <thead><tr class="border-b border-dark-600">
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">IP</th>
                        <th class="px-5 py-2.5 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Count</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="row in report.tables.top_source_ips" :key="row.ip">
                          <tr class="border-b border-dark-700/50 hover:bg-dark-700/30">
                            <td class="px-5 py-2.5 text-accent-400 font-mono text-xs" x-text="row.ip"></td>
                            <td class="px-5 py-2.5 text-gray-300" x-text="formatNum(row.count)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>
            </div>
          </template>
          </div>
        </div>
      </template>
    </main>

    <footer class="border-t border-dark-600 py-4">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-gray-600">LogLens v1.0 &mdash; Internal Use Only</div>
    </footer>
  </div>
</div>
</div>

</body>
</html>
