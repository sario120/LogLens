<style>

  /* ─── Light Theme (softer) ─── */
  --c-bg: #f0f2f6;
  --c-surface: #f8f9fc;
  --c-surface-raised: #edf0f5;
  --c-card: #fafbff;
  --c-hover: #e8ecf2;
  --c-active: #dde3eb;
  --c-text: #1a2332;
  --c-text-dim: #3d4a5c;
  --c-text-muted: #6b7a8e;
  --c-text-inverse: #ffffff;
  --c-border: #e2e8f0;
  --c-border-medium: #c8d0dc;
  --c-border-dark: #9aa8b9;
  --c-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --c-shadow-dropdown: 0 4px 12px rgba(0,0,0,0.08);
  --c-shadow-modal: 0 8px 32px rgba(0,0,0,0.10);
  --c-accent: #e8c84a;
  --c-accent-mid: #d4af37;
  --c-accent-deep: #b8941e;
  --c-success: #22c55e;
  --c-warning: #f59e0b;
  --c-danger: #ef4444;
  --c-scrollbar-track: #edf0f5;
  --c-scrollbar-thumb: #c8d0dc;
  --c-input-bg: #ffffff;
  --c-gray-50: #f0f2f6;
  --c-gray-100: #edf0f5;
  --c-gray-200: #e2e8f0;
  --c-gray-300: #c8d0dc;
  --c-gray-400: #9aa8b9;
  --c-gray-500: #6b7a8e;
  --c-gray-600: #3d4a5c;
  --c-gray-700: #2a3650;
  --c-gray-800: #222838;
  --c-gray-900: #1a1f2e;
}
[data-theme="dark"] {
  /* ─── Dark Theme (softer, warmer) ─── */
  --c-bg: #082f49;
  --c-surface: rgba(8,47,73,0.55);
  --c-surface-raised: rgba(8,47,73,0.7);
  --c-card: rgba(8,47,73,0.45);
  --c-hover: rgba(8,47,73,0.8);
  --c-active: rgba(212,175,55,0.12);
  --c-text: #f1f5f9;
  --c-text-dim: #cbd5e1;
  --c-text-muted: #94a3b8;
  --c-text-inverse: #0a0e17;
  --c-border: #2a3650;
  --c-border-medium: #3a4a6a;
  --c-border-dark: #4e5f82;
  --c-shadow: 0 1px 3px rgba(0,0,0,0.3);
  --c-shadow-dropdown: 0 4px 12px rgba(0,0,0,0.4);
  --c-shadow-modal: 0 8px 32px rgba(0,0,0,0.5);
  --c-accent: #e8c84a;
  --c-accent-mid: #d4af37;
  --c-accent-deep: #b8941e;
  --c-success: #22c55e;
  --c-warning: #f59e0b;
  --c-danger: #ef4444;
  --c-scrollbar-track: #222838;
  --c-scrollbar-thumb: #3a4a6a;
  --c-input-bg: #1e2436;
  --c-gray-50: #1a1f2e;
  --c-gray-100: #222838;
  --c-gray-200: #e8edf5;
  --c-gray-300: #b0bed9;
  --c-gray-400: #94a3b8;
  --c-gray-500: #94a3b8;
  --c-gray-600: #94a3b8;
  --c-gray-700: #64748b;
  --c-gray-800: #2a3650;
  --c-gray-900: #1a1f2e;
}
*{scrollbar-width:thin;scrollbar-color:var(--c-scrollbar-thumb) var(--c-scrollbar-track)}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-track{background:var(--c-scrollbar-track)}
*::-webkit-scrollbar-thumb{background:var(--c-scrollbar-thumb);border-radius:3px}
.drag-active{border-color:var(--c-accent-mid)!important;background:var(--c-hover)!important}
.spinner{border:3px solid var(--c-surface-raised);border-top-color:var(--c-accent-mid);border-radius:50%;width:40px;height:40px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tab-active{background:rgba(212,175,55,0.15);color:var(--c-accent);box-shadow:0 1px 3px var(--c-shadow)}
[data-theme="dark"] thead tr{background:rgba(212,175,55,0.06)}
[data-theme="dark"] thead th{color:var(--c-accent) !important;font-weight:600}
#report-content .space-y-6 > div > .bg-dark-800{background:var(--c-surface);border-color:var(--c-border)}
[data-theme="dark"] th.sortable{cursor:pointer;user-select:none;transition:color .15s}
[data-theme="dark"] th.sortable:hover{color:var(--c-accent)}
.sort-icon{font-size:10px;margin-left:4px;opacity:0.6}
.clickable{cursor:pointer;transition:color .15s}
.clickable:hover{color:var(--c-accent) !important}
[x-cloak]{display:none!important}
@media print {
  body { background: white !important; color: #111 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .bg-dark-800, .bg-dark-700, .bg-dark-900 { background: #f9fafb !important; border-color: #e5e7eb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .text-white, .text-gray-200, .text-gray-300 { color: #111 !important; }
  .text-gray-400, .text-gray-500 { color: #4b5563 !important; }
  .text-accent-400 { color: #2563eb !important; }
  .text-success { color: #16a34a !important; }
  .text-warning { color: #d97706 !important; }
  .text-danger { color: #dc2626 !important; }
  .border-dark-600, .border-dark-700 { border-color: #d1d5db !important; }
  button, .spinner, [x-cloak] { display: none !important; }
  #toast-container { display: none !important; }
  #report-content .rounded-xl { break-inside: avoid; page-break-inside: avoid; }
  canvas[data-chart] { max-width: 100% !important; }
}
.skeleton{background:linear-gradient(90deg,var(--c-surface-raised) 25%,var(--c-hover) 50%,var(--c-surface-raised) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.table-scroll thead th:first-child,
.table-scroll tbody td:first-child { position: sticky; left: 0; z-index: 1; }
.table-scroll thead th:first-child { background: var(--c-surface-raised); }
.table-scroll tbody td:first-child { background: var(--c-surface); }
.table-scroll tbody tr:hover td:first-child { background: var(--c-surface-raised); }
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
.sr-only:focus,.sr-only.focus\:not-sr-only:focus{position:fixed;width:auto;height:auto;padding:0.5rem 1rem;margin:0.5rem;overflow:visible;clip:auto;white-space:normal;z-index:999;top:0.5rem;left:0.5rem;background:var(--c-accent-mid);color:white;border-radius:0.5rem;font-size:0.875rem;font-weight:600;}
</style>
<script defer src="/static/js/alpine.min.js"></script>
<script src="/static/js/chart.umd.min.js"></script>
<script src="/static/js/html2pdf.bundle.min.js"></script>
<script>if(localStorage.getItem('theme')!=='light')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body class="min-h-screen font-sans" style="background:var(--c-bg);color:var(--c-text)">
<a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[999] focus:px-4 focus:py-2 focus:bg-accent-500 focus:text-white focus:rounded-lg">Skip to content</a>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.store('auth', {
    token: null,
    loggedIn: false,
    async login(apiKey) {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({api_key: apiKey})
      });
      if (!res.ok) {
        let msg = 'Invalid key';
        try { const d = await res.json(); msg = d.detail || msg; } catch(_) {}
        throw new Error(msg);
      }
      const data = await res.json();
      this.token = data.token;
      this.loggedIn = true;
    },
    async checkSession() {
      try {
        const res = await fetch('/api/session');
        if (res.ok) {
          const data = await res.json();
          this.token = data.token || null;
          this.loggedIn = true;
          return true;
        }
      } catch(e) {}
      this.loggedIn = false;
      return false;
    },
    async logout() {
      try { await fetch('/api/logout', {method:'POST', headers:{'Authorization':'Bearer '+this.token}}); } catch(e) {}
      this.token = null; this.loggedIn = false;
    },
  });

  Alpine.store('theme', {
    dark: localStorage.getItem('theme') !== 'light',
    toggle() { this.dark = !this.dark; localStorage.setItem('theme', this.dark ? 'dark' : 'light'); document.documentElement.setAttribute(this.dark ? 'data-theme' : 'data-theme', this.dark ? 'dark' : ''); if (!this.dark) document.documentElement.removeAttribute('data-theme'); }
  });

  Alpine.data('analyzer', () => ({
    view: 'upload',
    inputMode: 'file',
    logType: 'auto',
    excludeIps: '',
    slowThreshold: '',
    criticalThreshold: '',
    report: null,
    error: null,
    file: null,
    pasteContent: '',
    dragOver: false,
    pdfExporting: false,
    toastMessage: null,
    toastType: 'info',
    uploadProgress: -1,
    _draftSaveTimer: null,
    historyReports: [],
    historyQuery: '',
    historyFilterType: 'all',
    reportLabel: '',
    searchQuery: '',
    tableFilters: {},
    sortKey: {},
    sortDir: {},
    expandedRow: {},
    collapsedSections: {},
    tableRowLimits: {},
    batchMode: 'single',
    batchFiles: [],
    batchReports: [],
    batchLabel: '',
    batchLoading: false,
    batchError: null,
    correlationData: null,
    correlationLoading: false,
    correlationError: null,
    contextPanel: null,
    contextLoading: false,
    contextError: null,
    chartsRendered: false,
    renderPhase: 0,
    _hashUpdating: false,
    init() {
      this.restoreDraft();
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
      const hash = location.hash.slice(1);
      if (hash === 'history') this.showHistory();
      else if (hash.startsWith('report=')) {
        const id = hash.split('=')[1];
        if (id) LogLensDB.getReport(id).then(full => {
          if (full && full.full_report) {
            this.report = full.full_report;
            this.reportLabel = full.label || '';
            this.searchQuery = ''; this.tableFilters = {}; this.sortKey = {}; this.sortDir = {}; this.expandedRow = {};
            this.view = 'report';
            this._renderPhased();
          }
        }).catch(() => {});
      }
      else if (hash === 'batch' || hash === 'correlate') { this.inputMode = 'batch'; }
      window.addEventListener('hashchange', () => {
        if (this._hashUpdating) return;
        const h = location.hash.slice(1);
        if (h === 'history') this.showHistory();
        else if (h.startsWith('report=')) {
          const id = h.split('=')[1];
          if (id) LogLensDB.getReport(id).then(full => {
            if (full && full.full_report) { this.openHistoryReport(full); }
          }).catch(() => {});
        }
        else if (h === 'batch') { this.inputMode = 'batch'; this.view = 'upload'; }
        else if (h === 'correlate') { this.inputMode = 'batch'; this.view = 'upload'; }
        else if (this.view !== 'upload') this.reset();
      });
    },
    _showToast(msg, type, duration) { this.toastMessage = msg; this.toastType = type || 'info'; setTimeout(() => { if (this.toastMessage === msg) this.toastMessage = null; }, duration || 4000); },

    async analyze() {
      this.view = 'processing';
      this.error = null;
      try {
        if (this.file) {
          if (this.file.size > 50 * 1024 * 1024) { this.error = 'File too large (max 50MB).'; this.view = 'upload'; return; }
          await this._uploadFile();
          return;
        } else if (this.pasteContent.trim()) {
          const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: {'Authorization': 'Bearer ' + Alpine.store('auth').token, 'Content-Type': 'application/json'},
            body: JSON.stringify({content: this.pasteContent, log_type: this.logType, exclude_ips: this.excludeIps, slow_threshold: this.slowThreshold, critical_threshold: this.criticalThreshold})
          });
          await this._handleResponse(res);
        } else {
          throw new Error('No content provided');
        }
      } catch(e) {
        if (e.message === 'SESSION_EXPIRED') { this.error = 'Session expired — please sign in again.'; }
        else { this.error = e.message; }
        this.view = 'upload';
      }
    },
    _uploadFile() {
      return new Promise((resolve, reject) => {
        this.uploadProgress = 0;
        const fd = new FormData();
        fd.append('file', this.file);
        fd.append('log_type', this.logType);
        fd.append('exclude_ips', this.excludeIps);
        fd.append('slow_threshold', this.slowThreshold);
        fd.append('critical_threshold', this.criticalThreshold);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/analyze');
        xhr.setRequestHeader('Authorization', 'Bearer ' + Alpine.store('auth').token);
        xhr.upload.addEventListener('progress', (e) => { if (e.lengthComputable) this.uploadProgress = Math.round(e.loaded / e.total * 100); });
        xhr.addEventListener('load', () => {
          this.uploadProgress = -1;
          if (xhr.status === 401) { Alpine.store('auth').logout(); reject(new Error('SESSION_EXPIRED')); return; }
          try { const data = JSON.parse(xhr.responseText); if (xhr.status >= 200 && xhr.status < 300) { this.report = data; if (data.error) { reject(new Error(data.error)); return; } this.view = 'report'; this.updateHash(); this.chartsRendered = false; this._renderPhased(); this.saveToHistory(); LogLensDB.clearDraft(); this._notifyComplete(); resolve(); } else { reject(new Error(data.detail || 'Analysis failed')); } } catch(_) { reject(new Error('Analysis failed')); }
        });
        xhr.addEventListener('error', () => { this.uploadProgress = -1; reject(new Error('Network error')); });
        xhr.send(fd);
      });
    },
    _renderPhased() {
      this.renderPhase = 0;
      document.querySelectorAll('canvas[data-chart]').forEach(c => {
        const ex = Chart.getChart(c);
        if (ex) ex.destroy();
      });
      this.renderPhase = 2;
      this.$nextTick(() => {
        renderCharts(this.report, 'doughnut');
        setTimeout(() => {
          this.renderPhase = 3;
          this.$nextTick(() => {
            renderCharts(this.report, 'bar');
            setTimeout(() => {
              this.renderPhase = 4;
              this.$nextTick(() => {
                renderCharts(this.report, 'scatter');
                this.renderPhase = 5;
                this.chartsRendered = true;
              });
            }, 300);
          });
        }, 400);
      });
    },
    async _handleResponse(res) {
      if (!res.ok) {
        if (res.status === 401) { Alpine.store('auth').logout(); throw new Error('SESSION_EXPIRED'); }
        let msg = 'Analysis failed';
        try { const e = await res.json(); msg = e.detail || msg; } catch(_) {}
        throw new Error(msg);
      }
      this.report = await res.json();
      if (this.report.error) throw new Error(this.report.error);
      this.view = 'report';
      this.updateHash();
      this.chartsRendered = false;
      this._renderPhased();
      this.saveToHistory();
      LogLensDB.clearDraft();
      this._notifyComplete();
    },
    reset() { this.view = 'upload'; this.report = null; this.error = null; this.file = null; this.pasteContent = ''; this.logType = 'auto'; this.excludeIps = ''; this.slowThreshold = ''; this.criticalThreshold = ''; this.reportLabel = ''; this.searchQuery = ''; this.tableFilters = {}; this.sortKey = {}; this.sortDir = {}; this.expandedRow = {}; this.collapsedSections = {}; this.tableRowLimits = {}; this.chartsRendered = false; this.updateHash(); this.$nextTick(() => { const el = document.getElementById('main-content'); if (el) el.focus(); }); },

    async saveToHistory() {
      if (!this.report) return;
      try {
        const id = await LogLensDB.saveReport(this.report, this.reportLabel);
        this._showToast('Report saved to history', 'success');
        LogLensDB.clearDraft();
      } catch(e) { console.error('save history:', e); }
    },

    async showHistory() {
      this.view = 'history';
      this.updateHash();
      await this.loadHistory();
    },

    async loadHistory() {
      try {
        this.historyReports = await LogLensDB.listReports(this.historyQuery, this.historyFilterType);
      } catch(e) { console.error('load history:', e); this.historyReports = []; }
    },

    async openHistoryReport(rec) {
      try {
        const full = await LogLensDB.getReport(rec.id);
        if (full && full.full_report) {
          this.report = full.full_report;
          this.reportLabel = full.label || '';
          this.searchQuery = '';
          this.tableFilters = {};
          this.sortKey = {};
          this.sortDir = {};
          this.expandedRow = {};
          this.view = 'report';
          this._renderPhased();
        }
      } catch(e) { console.error('open history:', e); }
    },

    async deleteHistoryReport(id) {
      if (!confirm('Delete this report from history?')) return;
      try {
        await LogLensDB.deleteReport(id);
        await this.loadHistory();
        this._showToast('Report deleted', 'success');
      } catch(e) { console.error('delete history:', e); }
    },

    async updateHistoryLabel(id, label) {
      try { await LogLensDB.updateReportLabel(id, label); } catch(e) { console.error(e); }
    },

    _autoSaveDraft() {
      clearTimeout(this._draftSaveTimer);
      this._draftSaveTimer = setTimeout(() => {
        if (this.pasteContent.trim()) {
          LogLensDB.saveDraft({ content: this.pasteContent, logType: this.logType, excludeIps: this.excludeIps });
        }
      }, 1500);
    },

    async restoreDraft() {
      try {
        const draft = await LogLensDB.getDraft();
        if (draft) {
          this.pasteContent = draft.content || '';
          this.logType = draft.logType || 'auto';
          this.excludeIps = draft.excludeIps || '';
          if (this.pasteContent.trim()) this._showToast('Draft restored', 'info', 3000);
        }
      } catch(e) {}
    },

    filterTable(table, rows) {
      if (!rows || !rows.length) return rows;
      const filters = this.tableFilters[table] || {};
      const q = this.searchQuery.toLowerCase();
      let result = rows;
      Object.keys(filters).forEach(col => {
        const f = (filters[col] || '').toLowerCase();
        if (!f) return;
        result = result.filter(r => String(r[col] || '').toLowerCase().includes(f));
      });
      if (q) {
        result = result.filter(r => Object.values(r).some(v => String(v || '').toLowerCase().includes(q)));
      }
      return result;
    },

    sortTable(table, rows, col) {
      if (!rows || !rows.length) return rows;
      if (this.sortKey[table] === col) {
        this.sortDir[table] = this.sortDir[table] === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortKey[table] = col;
        this.sortDir[table] = 'desc';
      }
      const dir = this.sortDir[table] === 'asc' ? 1 : -1;
      return [...rows].sort((a, b) => {
        let va = a[col], vb = b[col];
        if (va == null) va = '';
        if (vb == null) vb = '';
        const na = parseFloat(va), nb = parseFloat(vb);
        if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
        return String(va).localeCompare(String(vb)) * dir;
      });
    },

    toggleSort(table, col) {
      if (!this.sortKey[table]) { this.sortKey[table] = col; this.sortDir[table] = 'desc'; }
      else if (this.sortKey[table] === col) { this.sortDir[table] = this.sortDir[table] === 'asc' ? 'desc' : 'asc'; }
      else { this.sortKey[table] = col; this.sortDir[table] = 'desc'; }
    },

    sortIcon(table, col) {
      if (this.sortKey[table] !== col) return '';
      return this.sortDir[table] === 'asc' ? ' \u25B2' : ' \u25BC';
    },

    toggleExpand(table, idx) {
      const key = table + '_' + idx;
      this.expandedRow[key] = !this.expandedRow[key];
    },

    isExpanded(table, idx) {
      return !!this.expandedRow[table + '_' + idx];
    },

    filterByValue(col, val) {
      this.searchQuery = String(val);
      this._showToast(`Filtered by ${col}: ${val}`, 'info', 2000);
    },
    _pageSize(table) {
      const sizes = {
        hourly_timeline: 50, hourly_performance: 50, endpoint_performance: 50,
        status_codes: 50, ip_details: 50, top_endpoints: 50, endpoint_details: 50,
        levels: 50, processes: 50, top_clients: 50, incidents: 50, normalized_queries: 50,
        slow_queries: 30, lock_events: 30, autovacuum_events: 30, replication_events: 30,
        top_messages: 20, error_samples: 25, auth_failures_detail: 30, top_source_ips: 10,
        correlation_timeline: 100,
      };
      return sizes[table] || 50;
    },
    rowLimit(table) {
      return this.tableRowLimits[table] || this._pageSize(table);
    },
    showMoreRows(table) {
      this.tableRowLimits[table] = (this.tableRowLimits[table] || this._pageSize(table)) + this._pageSize(table);
    },
    showAllRows(table) {
      this.tableRowLimits[table] = Infinity;
    },
    resetRowLimit(table) {
      delete this.tableRowLimits[table];
    },
    updateHash() {
      this._hashUpdating = true;
      if (this.view === 'history') history.replaceState(null, '', '#history');
      else if (this.view === 'report' && this.report?.analysis_id)
        history.replaceState(null, '', '#report=' + this.report.analysis_id);
      else if (this.view === 'comparison') history.replaceState(null, '', '#batch');
      else if (this.view === 'correlation') history.replaceState(null, '', '#correlate');
      else history.replaceState(null, '', window.location.pathname);
      this._hashUpdating = false;
    },
    exportJson() {
      if (!this.report) return;
      const blob = new Blob([JSON.stringify(this.report, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `loglens-report-${this.report.log_type}-${Date.now()}.json`;
      a.click(); URL.revokeObjectURL(url);
    },
    exportText() {
      if (!this.report) return;
      const r = this.report;
      const lines = [];
      lines.push('LogLens Analysis Report');
      lines.push('=' .repeat(40));
      lines.push(`Type: ${r.log_type_label || r.log_type || 'unknown'}`);
      if (r.time_range && r.time_range.start) lines.push(`Time Range: ${r.time_range.start} — ${r.time_range.end}`);
      if (r.parsed != null) lines.push(`Entries: ${r.parsed} of ${r.total_lines}`);
      if (r.processing_ms != null) lines.push(`Parsed in: ${r.processing_ms}ms`);
      lines.push('');
      lines.push('Summary');
      lines.push('-'.repeat(40));
      if (r.summary) {
        Object.entries(r.summary).forEach(([k, v]) => {
          if (v != null && typeof v === 'number' && k !== 'health') {
            lines.push(`  ${k.replace(/_/g, ' ')}: ${v.toLocaleString()}`);
          }
        });
      }
      if (r.duration_stats) {
        lines.push('');
        lines.push('Duration Stats');
        lines.push('-'.repeat(40));
        lines.push(`  Count: ${r.duration_stats.count}`);
        lines.push(`  Avg: ${r.duration_stats.avg}ms`);
        lines.push(`  P50: ${r.duration_stats.p50}ms`);
        lines.push(`  P95: ${r.duration_stats.p95}ms`);
        lines.push(`  P99: ${r.duration_stats.p99}ms`);
        lines.push(`  Max: ${r.duration_stats.max}ms`);
      }
      if (r.slow_queries && r.slow_queries.length) {
        lines.push('');
        lines.push(`Slow Queries (${r.slow_queries.length})`);
        lines.push('-'.repeat(40));
        r.slow_queries.slice(0, 10).forEach(q => {
          lines.push(`  [${q.timestamp}] ${q.duration_ms}ms ${q.stmt_type || ''} ${q.table || ''}`);
          lines.push(`    ${q.message}`);
        });
      }
      if (r.tables && r.tables.status_codes) {
        lines.push('');
        lines.push('Status Codes');
        lines.push('-'.repeat(40));
        r.tables.status_codes.forEach(s => {
          lines.push(`  ${s.status}: ${s.count} (${s.pct}%)`);
        });
      }
      if (r.tables && r.tables.ip_details) {
        lines.push('');
        lines.push('Top IPs');
        lines.push('-'.repeat(40));
        r.tables.ip_details.slice(0, 10).forEach(ip => {
          lines.push(`  ${ip.ip}: ${ip.count} requests, ${ip.error_rate}% errors`);
        });
      }
      lines.push('');
      lines.push(`Generated by LogLens on ${new Date().toLocaleString()}`);
      const blob = new Blob([lines.join('\n')], {type: 'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `loglens-summary-${r.log_type}-${Date.now()}.txt`;
      a.click(); URL.revokeObjectURL(url);
    },
    exportCSV() {
      if (!this.report || !this.report._entries || !this.report._entries.length) return;
      const entries = this.report._entries;
      const headers = Object.keys(entries[0]);
      const csvRows = [headers.join(',')];
      for (const entry of entries) {
        const values = headers.map(h => {
          const val = entry[h];
          if (val == null) return '';
          const str = String(val);
          if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return '"' + str.replace(/"/g, '""') + '"';
          }
          return str;
        });
        csvRows.push(values.join(','));
      }
      const blob = new Blob([csvRows.join('\n')], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `loglens-data-${this.report.log_type || 'unknown'}-${Date.now()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    },
    _notifyComplete() {
      if ('Notification' in window && Notification.permission === 'granted') {
        const r = this.report;
        const title = 'LogLens Analysis Complete';
        const body = `${r.log_type_label || r.log_type || 'Log'} — ${r.parsed || 0} entries analyzed`;
        try { new Notification(title, { body, icon: '/static/favicon.svg' }); } catch(_) {}
      }
    },
    toggleSection(key) {
      this.collapsedSections[key] = !this.collapsedSections[key];
    },
    isSectionCollapsed(key) {
      return !!this.collapsedSections[key];
    },
    healthLabel(h) { return h === 'healthy' ? 'Healthy' : h === 'degraded' ? 'Degraded' : h === 'critical' ? 'Critical' : null; },
    healthColor(h) { const cs = getComputedStyle(document.documentElement); return h === 'healthy' ? cs.getPropertyValue('--c-success').trim() : h === 'degraded' ? cs.getPropertyValue('--c-warning').trim() : h === 'critical' ? cs.getPropertyValue('--c-danger').trim() : '#9ca3af'; },
    buildExportHeader() {
      const r = this.report;
      const chips = [];
      chips.push(`<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25);">${r.log_type_label || r.log_type || 'unknown'}</span>`);
      const health = r.summary && r.summary.health;
      if (health) {
        const c = this.healthColor(health);
        chips.push(`<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;background:${c}26;color:${c};border:1px solid ${c}40;"><span style="width:6px;height:6px;border-radius:9999px;background:${c};"></span>${this.healthLabel(health)}</span>`);
      }
      if (r.summary && r.summary.incident_count > 0) {
        chips.push(`<span style="font-size:11px;color:#f59e0b;">${r.summary.incident_count} incident(s) detected</span>`);
      }
      if (r.time_range && r.time_range.start) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">${r.time_range.start} &mdash; ${r.time_range.end}</span>`);
      }
      if (r.processing_ms != null) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">Parsed in ${r.processing_ms}ms</span>`);
      }
      if (r.parsed != null) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">${r.parsed} of ${r.total_lines} entries</span>`);
      }
      if (r.parse_errors > 0) {
        chips.push(`<span style="font-size:11px;color:#f59e0b;">${r.parse_errors} parse errors</span>`);
      }
      if (r.excluded_ips && r.excluded_ips.length) {
        chips.push(`<span style="font-size:11px;color:#9ca3af;">Excluded: ${r.excluded_ips.join(', ')}</span>`);
      }
      return `<div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #243049;">
        <div style="font-size:22px;font-weight:700;color:#fff;">Analysis Report</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;">${chips.join('')}</div>
        <div style="font-size:10px;color:#6b7280;margin-top:10px;">Generated by LogLens on ${new Date().toLocaleString()}</div>
      </div>`;
    },
    async exportPdf() {
      if (!this.report) return;
      this.pdfExporting = true;
      await this.$nextTick();
      await new Promise(r => setTimeout(r, 1100));

      const sourceContent = document.getElementById('report-content');
      if (!sourceContent) { this.pdfExporting = false; return; }

      if (typeof html2pdf === 'undefined') {
        this.pdfExporting = false;
        this._showToast('PDF library unavailable — opening browser print dialog instead.', 'warning', 5000);
        window.print();
        return;
      }

      const pdfMargin = [10, 10, 16, 10];
      const pdfPageWidthMm = 420;
      const pdfContentWidthPx = Math.round((pdfPageWidthMm - pdfMargin[1] - pdfMargin[3]) * 96 / 25.4);

      const exportRoot = document.createElement('div');
      exportRoot.setAttribute('x-ignore', '');
      exportRoot.style.cssText = 'width:100%;background:#0a0e17;color:#e5e7eb;padding:24px;font-family:sans-serif;';
      exportRoot.innerHTML = this.buildExportHeader();
      const contentClone = sourceContent.cloneNode(true);
      exportRoot.appendChild(contentClone);

      function renderAlpineToStatic(element, report) {
        function getValue(obj, path) {
          if (!path) return null;
          const parts = path.split('.');
          let current = obj;
          for (const part of parts) {
            if (current && current[part] !== undefined) current = current[part];
            else return null;
          }
          return current;
        }
        function formatNum(v) { return v != null ? Number(v).toLocaleString() : '\u2014'; }
        function formatPct(v) { return v != null ? v + '%' : '\u2014'; }
        function formatBytes(b) {
          if (b == null) return '\u2014';
          for (const u of ['B','KB','MB','GB','TB']) { if (Math.abs(b) < 1024) return b.toFixed(b < 10 && u !== 'B' ? 2 : 0) + ' ' + u; b /= 1024; }
          return b.toFixed(2) + ' PB';
        }
        function healthLabel(h) {
          return h === 'healthy' ? 'Healthy' : h === 'degraded' ? 'Degraded' : h === 'critical' ? 'Critical' : null;
        }

        element.querySelectorAll('[x-text]').forEach(el => {
          const expr = el.getAttribute('x-text').trim();
          let value = null;
          if (expr.includes('formatNum(')) {
            const m = expr.match(/formatNum\(([^)]+)\)/);
            if (m) value = formatNum(getValue(report, m[1]));
          } else if (expr.includes('formatPct(')) {
            const m = expr.match(/formatPct\(([^)]+)\)/);
            if (m) value = formatPct(getValue(report, m[1]));
          } else if (expr.includes('formatBytes(')) {
            const m = expr.match(/formatBytes\(([^)]+)\)/);
            if (m) value = formatBytes(getValue(report, m[1]));
          } else if (expr.includes('healthLabel(')) {
            const m = expr.match(/healthLabel\(([^)]+)\)/);
            if (m) value = healthLabel(getValue(report, m[1]));
          } else if (expr.includes(' || ')) {
            const parts = expr.split('||').map(p => p.trim());
            for (const part of parts) {
              let val = null;
              if (part.startsWith('report.')) val = getValue(report, part.replace('report.', ''));
              else if (part.match(/^['"].*['"]$/)) val = part.slice(1, -1);
              else { const sm = part.match(/(\w+)\.(\w+)/); if (sm) val = getValue(report, sm[1]+'.'+sm[2]); }
              if (val !== null && val !== undefined && val !== '') { value = String(val); break; }
            }
            if (!value) value = '\u2014';
          } else if (expr.startsWith('report.')) {
            const val = getValue(report, expr.replace('report.', ''));
            value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
          } else {
            const val = getValue(report, expr.replace(/^report\./, ''));
            value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
          }
          if (value !== null && value !== undefined) el.textContent = value;
          el.removeAttribute('x-text');
        });

        element.querySelectorAll('[x-for]').forEach(el => {
          const expr = el.getAttribute('x-for');
          const match = expr.match(/\((\w+),\s*(\w+)\)\s+in\s+([^\s]+)/);
          if (!match) return;
          const itemName = match[1], indexName = match[2];
          const dataPath = match[3].replace(/^report\./, '');
          const data = getValue(report, dataPath);
          const parent = el.parentNode;
          if (!data || !Array.isArray(data) || data.length === 0) { el.remove(); return; }
          const tpl = el.cloneNode(true);
          tpl.removeAttribute('x-for');
          data.forEach((item, idx) => {
            const row = tpl.cloneNode(true);
            row.querySelectorAll('[x-text]').forEach(cell => {
              const cellExpr = cell.getAttribute('x-text');
              let value = null;
              if (cellExpr.includes(itemName + '.')) {
                const path = cellExpr.replace(itemName + '.', '');
                const val = getValue(item, path);
                value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
              } else if (cellExpr.includes(indexName)) {
                value = String(idx + 1);
              } else if (cellExpr.includes('formatNum(')) {
                const m2 = cellExpr.match(/formatNum\(([^)]+)\)/);
                if (m2) { const p = m2[1].replace(itemName+'.',''); value = formatNum(getValue(item, p)); }
              } else if (cellExpr.includes('formatPct(')) {
                const m2 = cellExpr.match(/formatPct\(([^)]+)\)/);
                if (m2) { const p = m2[1].replace(itemName+'.',''); value = formatPct(getValue(item, p)); }
              } else if (cellExpr.includes('formatBytes(')) {
                const m2 = cellExpr.match(/formatBytes\(([^)]+)\)/);
                if (m2) { const p = m2[1].replace(itemName+'.',''); value = formatBytes(getValue(item, p)); }
              } else {
                const val = getValue(item, cellExpr.replace(/^report\./, ''));
                value = val != null ? (typeof val === 'number' ? val.toLocaleString() : String(val)) : '\u2014';
              }
              if (value !== null && value !== undefined) cell.textContent = value;
              cell.removeAttribute('x-text');
            });
            row.querySelectorAll('[class]').forEach(cell => {
              cell.className = cell.className.split(' ').filter(c => !c.includes('{') && !c.includes('}') && !c.includes('"')).join(' ');
            });
            parent.insertBefore(row, el);
          });
          parent.removeChild(el);
        });

        element.querySelectorAll('[x-data], [x-init], [x-cloak]').forEach(el => {
          Array.from(el.attributes).forEach(attr => {
            if (attr.name.startsWith('x-') || attr.name.startsWith('@') || attr.name === 'x-data' || attr.name === 'x-init' || attr.name === 'x-cloak') el.removeAttribute(attr.name);
          });
        });
      }

      renderAlpineToStatic(contentClone, this.report);

      const liveCanvases = sourceContent.querySelectorAll('canvas[data-chart]');
      const clonedCanvases = contentClone.querySelectorAll('canvas[data-chart]');
      liveCanvases.forEach((liveCanvas, i) => {
        const cloneCanvas = clonedCanvases[i];
        if (!cloneCanvas || liveCanvas.width === 0 || liveCanvas.height === 0) return;
        try {
          const chart = Chart.getChart(liveCanvas);
          if (chart) chart.update('none');
          const img = document.createElement('img');
          img.src = liveCanvas.toDataURL('image/png', 1.0);
          img.style.cssText = 'width:100%;height:auto;max-width:100%;display:block;';
          img.setAttribute('data-chart-replaced', 'true');
          cloneCanvas.parentNode.replaceChild(img, cloneCanvas);
        } catch(e) { console.warn('Chart conversion failed:', e); }
      });

      contentClone.querySelectorAll('[style*="display: none"], [style*="display:none"], .hidden, [hidden]').forEach(el => el.remove());
      contentClone.querySelectorAll('.overflow-x-auto').forEach(el => { el.style.overflow = 'visible'; el.style.maxWidth = '100%'; });
      contentClone.querySelectorAll('.rounded-xl').forEach(el => { el.style.breakInside = 'avoid'; el.style.pageBreakInside = 'avoid'; });

      const prevOverflowX = document.documentElement.style.overflowX;
      document.documentElement.style.overflowX = 'hidden';
      document.body.appendChild(exportRoot);

      const opt = {
        margin: pdfMargin,
        filename: `loglens-report-${this.report.log_type}-${Date.now()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#0a0e17',
          windowWidth: pdfContentWidthPx, logging: false,
          onclone: (doc) => {
            const imgs = doc.querySelectorAll('img');
            return Promise.all(Array.from(imgs).map(img => {
              if (img.complete) return Promise.resolve();
              return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; setTimeout(resolve, 500); });
            }));
          }
        },
        jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape', compress: true },
        pagebreak: { mode: ['css', 'avoid-all', 'legacy'], after: '.page-break-after' },
      };

      try {
        const pdf = await html2pdf().set(opt).from(exportRoot).toPdf().get('pdf');
        const pageCount = pdf.internal.getNumberOfPages();
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const stamp = new Date().toLocaleString();
        for (let i = 1; i <= pageCount; i++) {
          pdf.setPage(i);
          pdf.setFontSize(7);
          pdf.setTextColor(100, 100, 100);
          pdf.text(`LogLens · ${this.report.log_type_label || this.report.log_type}`, 10, 8);
          pdf.text(`Generated ${stamp}`, pageWidth - 10, 8, { align: 'right' });
          pdf.setFontSize(8);
          pdf.setTextColor(140, 140, 140);
          pdf.text(`Page ${i} of ${pageCount}`, pageWidth / 2, pageHeight - 6, { align: 'center' });
        }
        pdf.save(opt.filename);
      } catch(e) {
        console.error('PDF export failed:', e);
        this._showToast('PDF generation failed — opening browser print dialog instead.', 'warning', 5000);
        window.print();
      } finally {
        if (document.body.contains(exportRoot)) document.body.removeChild(exportRoot);
        document.documentElement.style.overflowX = prevOverflowX;
        if (this.report) {
          this.renderPhase = 5;
          this.$nextTick(() => {
            document.querySelectorAll('canvas[data-chart]').forEach(c => {
              const ex = Chart.getChart(c);
              if (ex) ex.destroy();
            });
            renderCharts(this.report);
            this.chartsRendered = true;
          });
        }
        this.pdfExporting = false;
      }
    },
    formatBytes(b) {
      if (b == null) return '\u2014';
      for (const u of ['B','KB','MB','GB','TB']) { if (Math.abs(b) < 1024) return b.toFixed(b < 10 && u !== 'B' ? 2 : 0) + ' ' + u; b /= 1024; }
      return b.toFixed(2) + ' PB';
    },
    formatNum(v) { return v != null ? Number(v).toLocaleString() : '\u2014'; },
    formatPct(v) { return v != null ? v + '%' : '\u2014'; },

    addBatchFile(fileObj) {
      this.batchFiles.push({ file: fileObj, content: '', name: fileObj.name });
      const reader = new FileReader();
      reader.onload = (e) => {
        const idx = this.batchFiles.findIndex(f => f.file === fileObj);
        if (idx >= 0) this.batchFiles[idx].content = e.target.result;
      };
      reader.readAsText(fileObj);
    },

    addBatchPaste(name) {
      this.batchFiles.push({ file: null, content: '', name: name || 'paste-' + (this.batchFiles.length + 1) });
    },

    removeBatchFile(idx) {
      this.batchFiles.splice(idx, 1);
    },

    async analyzeBatch() {
      if (!this.batchFiles.length) return;
      this.batchLoading = true;
      this.batchError = null;
      try {
        const files = this.batchFiles.map(f => ({ content: f.content, name: f.name }));
        const res = await fetch('/api/analyze-batch', {
          method: 'POST',
          headers: {'Authorization': 'Bearer ' + Alpine.store('auth').token, 'Content-Type': 'application/json'},
          body: JSON.stringify({ files, log_type: this.logType, exclude_ips: this.excludeIps, label: this.batchLabel, slow_threshold: this.slowThreshold, critical_threshold: this.criticalThreshold })
        });
        if (res.status === 401) { Alpine.store('auth').logout(); throw new Error('Session expired'); }
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Batch analysis failed'); }
        const data = await res.json();
        this.batchReports = data.reports || [];
        this.view = 'comparison';
        this.updateHash();
        this.$nextTick(() => renderBatchCharts(this.batchReports));
      } catch(e) {
        this.batchError = e.message;
      } finally {
        this.batchLoading = false;
      }
    },

    async analyzeCorrelate() {
      if (!this.batchFiles.length) return;
      this.correlationLoading = true;
      this.correlationError = null;
      try {
        const files = this.batchFiles.map(f => ({ content: f.content, name: f.name, log_type: 'auto' }));
        const res = await fetch('/api/analyze-correlate', {
          method: 'POST',
          headers: {'Authorization': 'Bearer ' + Alpine.store('auth').token, 'Content-Type': 'application/json'},
          body: JSON.stringify({ files, exclude_ips: this.excludeIps })
        });
        if (res.status === 401) { Alpine.store('auth').logout(); throw new Error('Session expired'); }
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Correlation failed'); }
        const data = await res.json();
        this.correlationData = data.correlation || null;
        this.view = 'correlation';
        this.updateHash();
      } catch(e) {
        this.correlationError = e.message;
      } finally {
        this.correlationLoading = false;
      }
    },

    async showContext(analysisId, entryIdx) {
      this.contextLoading = true;
      this.contextError = null;
      this.contextPanel = null;
      try {
        const res = await fetch(`/api/context/${analysisId}/${entryIdx}?before=5&after=5`, {
          headers: {'Authorization': 'Bearer ' + Alpine.store('auth').token}
        });
        if (res.status === 401) { Alpine.store('auth').logout(); throw new Error('Session expired'); }
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Context not found'); }
        this.contextPanel = await res.json();
      } catch(e) {
        this.contextError = e.message;
      } finally {
        this.contextLoading = false;
      }
    },

    closeContext() { this.contextPanel = null; this.contextError = null; },

    resetBatch() {
      this.batchFiles = [];
      this.batchReports = [];
      this.batchLabel = '';
      this.batchError = null;
      this.batchLoading = false;
      this.correlationData = null;
      this.correlationError = null;
      this.correlationLoading = false;
      this.contextPanel = null;
      this.contextError = null;
    },
  }));
});
</script>

<script>
function renderCharts(report, phase) {
  if (!report) return;
  const cs = getComputedStyle(document.documentElement);
  const tickColor = cs.getPropertyValue('--c-text-dim').trim() || '#9ca3af';
  const gridColor = cs.getPropertyValue('--c-border').trim() || '#243049';
  const accentMid = cs.getPropertyValue('--c-accent-mid').trim() || '#3b82f6';
  const successC = cs.getPropertyValue('--c-success').trim() || '#22c55e';
  const warningC = cs.getPropertyValue('--c-warning').trim() || '#f59e0b';
  const dangerC = cs.getPropertyValue('--c-danger').trim() || '#ef4444';

  const charts = report.charts || {};
  if (!phase) {
    document.querySelectorAll('canvas[data-chart]').forEach(c => {
      const existing = Chart.getChart(c);
      if (existing) existing.destroy();
    });
  }

  const doughnutOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: tickColor, padding: 12 } } } };
  const barOpts = (horizontal) => ({
    indexAxis: horizontal ? 'y' : 'x',
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      x: { ticks: { color: tickColor }, grid: { color: horizontal ? gridColor : 'rgba(0,0,0,0)' } },
      y: { ticks: { color: tickColor, font: { size: 11 } }, grid: { color: horizontal ? 'rgba(0,0,0,0)' : gridColor } }
    },
    plugins: { legend: { display: false } }
  });

  if (charts.status_distribution && (!phase || phase === 'doughnut')) {
    new Chart(document.getElementById('chart-status'), {
      type: 'doughnut',
      data: {
        labels: charts.status_distribution.map(d => d.label),
        datasets: [{ data: charts.status_distribution.map(d => d.value), backgroundColor: [successC, warningC, dangerC,'#b8941e','#94a3b8','#64748b','#78716c'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.level_distribution && (!phase || phase === 'doughnut')) {
    new Chart(document.getElementById('chart-levels'), {
      type: 'doughnut',
      data: {
        labels: charts.level_distribution.map(d => d.label),
        datasets: [{ data: charts.level_distribution.map(d => d.value), backgroundColor: [successC, accentMid, warningC, dangerC,'#8b5cf6','#6b7280'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

  if (charts.method_distribution && (!phase || phase === 'doughnut')) {
    new Chart(document.getElementById('chart-methods'), {
      type: 'doughnut',
      data: {
        labels: charts.method_distribution.map(d => d.label),
        datasets: [{ data: charts.method_distribution.map(d => d.value), backgroundColor: [accentMid, successC, warningC, dangerC,'#8b5cf6','#6366f1'], borderWidth: 0 }]
      },
      options: doughnutOpts
    });
  }

function renderBatchCharts(reports) {
  const cs = getComputedStyle(document.documentElement);
  const tickColor = cs.getPropertyValue('--c-text-dim').trim() || '#9ca3af';
  const gridColor = cs.getPropertyValue('--c-border').trim() || '#243049';
  const accentMid = cs.getPropertyValue('--c-accent-mid').trim() || '#d4af37';
  const successC = cs.getPropertyValue('--c-success').trim() || '#22c55e';
  const warningC = cs.getPropertyValue('--c-warning').trim() || '#f59e0b';
  const dangerC = cs.getPropertyValue('--c-danger').trim() || '#ef4444';

  reports.forEach((r, idx) => {
    if (!r || r.error) return;
    const charts = r.charts || {};
    const barOpts = (horizontal) => ({
      indexAxis: horizontal ? 'y' : 'x', responsive: true, maintainAspectRatio: false,
      scales: {
        x: { ticks: { color: tickColor, font: { size: 9 } }, grid: { color: horizontal ? gridColor : 'rgba(0,0,0,0)' } },
        y: { ticks: { color: tickColor, font: { size: 9 } }, grid: { color: horizontal ? 'rgba(0,0,0,0)' : gridColor } }
      },
      plugins: { legend: { display: false } }
    });
    const doughnutOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: tickColor, padding: 8, font: { size: 10 } } } } };

    if (charts.hourly_timeline && charts.hourly_timeline.length) {
      const el = document.getElementById('chart-batch-timeline-' + idx);
      if (el) { const ex = Chart.getChart(el); if (ex) ex.destroy(); new Chart(el, { type: 'bar', data: { labels: charts.hourly_timeline.map(d => d.label), datasets: [{ data: charts.hourly_timeline.map(d => d.value), backgroundColor: accentMid, borderRadius: 3 }] }, options: barOpts(false) }); }
    }
    if (charts.status_distribution && charts.status_distribution.length) {
      const el = document.getElementById('chart-batch-status-' + idx);
      if (el) { const ex = Chart.getChart(el); if (ex) ex.destroy(); new Chart(el, { type: 'doughnut', data: { labels: charts.status_distribution.map(d => d.label), datasets: [{ data: charts.status_distribution.map(d => d.value), backgroundColor: [successC, warningC, dangerC, '#b8941e', '#94a3b8'], borderWidth: 0 }] }, options: doughnutOpts }); }
    }
    if (charts.method_distribution && charts.method_distribution.length) {
      const el = document.getElementById('chart-batch-methods-' + idx);
      if (el) { const ex = Chart.getChart(el); if (ex) ex.destroy(); new Chart(el, { type: 'doughnut', data: { labels: charts.method_distribution.map(d => d.label), datasets: [{ data: charts.method_distribution.map(d => d.value), backgroundColor: [accentMid, successC, warningC, dangerC, '#8b5cf6'], borderWidth: 0 }] }, options: doughnutOpts }); }
    }
    if (charts.top_endpoints && charts.top_endpoints.length) {
      const el = document.getElementById('chart-batch-endpoints-' + idx);
      if (el) { const ex = Chart.getChart(el); if (ex) ex.destroy(); new Chart(el, { type: 'bar', data: { labels: charts.top_endpoints.slice(0, 8).map(d => d.label.length > 25 ? d.label.slice(0,25)+'…' : d.label), datasets: [{ data: charts.top_endpoints.slice(0, 8).map(d => d.value), backgroundColor: '#b8941e', borderRadius: 3 }] }, options: barOpts(true) }); }
    }
    if (charts.top_ips && charts.top_ips.length) {
      const el = document.getElementById('chart-batch-ips-' + idx);
      if (el) { const ex = Chart.getChart(el); if (ex) ex.destroy(); new Chart(el, { type: 'bar', data: { labels: charts.top_ips.slice(0, 8).map(d => d.label), datasets: [{ data: charts.top_ips.slice(0, 8).map(d => d.value), backgroundColor: successC, borderRadius: 3 }] }, options: barOpts(true) }); }
    }
    if (charts.level_distribution && charts.level_distribution.length) {
      const el = document.getElementById('chart-batch-levels-' + idx);
      if (el) { const ex = Chart.getChart(el); if (ex) ex.destroy(); new Chart(el, { type: 'doughnut', data: { labels: charts.level_distribution.map(d => d.label), datasets: [{ data: charts.level_distribution.map(d => d.value), backgroundColor: [successC, accentMid, warningC, dangerC, '#8b5cf6', '#6b7280'], borderWidth: 0 }] }, options: doughnutOpts }); }
    }
    if (charts.top_messages && charts.top_messages.length) {
      const el = document.getElementById('chart-batch-msgs-' + idx);
      if (el) { const ex = Chart.getChart(el); if (ex) ex.destroy(); new Chart(el, { type: 'bar', data: { labels: charts.top_messages.slice(0, 8).map(d => d.label.length > 30 ? d.label.slice(0,30)+'…' : d.label), datasets: [{ data: charts.top_messages.slice(0, 8).map(d => d.value), backgroundColor: '#b8941e', borderRadius: 3 }] }, options: barOpts(true) }); }
    }
  });
}

          <form @submit.prevent="loginError=''; loading=true; $store.auth.login(apiKey).catch(e => { loginError=e.message; loading=false; })">
            <label class="block text-xs font-semibold uppercase tracking-widest mb-3" :class="$store.theme.dark ? 'text-gray-400' : 'text-gray-500'">API Key</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <svg class="w-4 h-4 transition-colors" :class="$store.theme.dark ? 'text-gray-600 group-focus-within:text-accent-400' : 'text-gray-400 group-focus-within:text-accent-500'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
              </div>
              <input :type="showKey ? 'text' : 'password'" x-model="apiKey" required placeholder="Paste your API key"
                class="w-full pl-10 pr-12 py-3.5 rounded-xl text-sm transition-all duration-200 outline-none placeholder-opacity-60"
                :class="$store.theme.dark ? 'bg-dark-700 border-dark-600 text-white placeholder-gray-600 focus:border-accent-500 focus:ring-2 focus:ring-accent-500/20 border' : 'bg-gray-50 border-gray-300 text-gray-900 placeholder-gray-400 focus:border-accent-500 focus:ring-2 focus:ring-accent-500/20 border'">
              <button type="button" @click="showKey = !showKey" class="absolute inset-y-0 right-0 flex items-center pr-3.5 transition-colors" :class="$store.theme.dark ? 'text-gray-600 hover:text-gray-400' : 'text-gray-400 hover:text-gray-600'">
                <svg x-show="!showKey" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <svg x-show="showKey" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
              </button>
            </div>

            <!-- Error -->
            <div x-show="loginError" x-cloak x-transition class="mt-4 px-3.5 py-2.5 rounded-lg text-sm flex items-center gap-2" :class="$store.theme.dark ? 'bg-danger/10 text-danger border border-danger/20' : 'bg-red-50 text-red-600 border border-red-200'">
              <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
              <span x-text="loginError"></span>
            </div>

            <!-- Submit -->
            <button type="submit" :disabled="loading || !apiKey.trim()" class="mt-6 w-full py-3.5 px-4 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2 relative overflow-hidden disabled:cursor-not-allowed"
              :class="(!loading && apiKey.trim()) ? ($store.theme.dark ? 'bg-gradient-to-r from-accent-500 to-accent-600 hover:from-accent-400 hover:to-accent-500 text-white shadow-lg shadow-accent-500/20 hover:shadow-accent-500/30' : 'bg-gradient-to-r from-accent-500 to-accent-600 hover:from-accent-400 hover:to-accent-500 text-white shadow-lg shadow-accent-500/20 hover:shadow-accent-500/30') : ($store.theme.dark ? 'bg-dark-700 text-gray-600' : 'bg-gray-200 text-gray-400')">
              <span x-show="!loading" class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
                Sign In
              </span>
              <span x-show="loading" class="flex items-center gap-2">
                <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                Authenticating...
              </span>
            </button>
          </form>
        </div>

        <!-- Footer hint -->
        <div class="mt-6 pt-5 border-t flex items-center justify-center" :class="$store.theme.dark ? 'border-dark-600/60' : 'border-gray-200'">
          <p class="text-xs" :class="$store.theme.dark ? 'text-gray-600' : 'text-gray-400'">
            <kbd class="px-1.5 py-0.5 rounded text-[10px] font-mono border" :class="$store.theme.dark ? 'bg-dark-700 border-dark-600 text-gray-500' : 'bg-gray-100 border-gray-200 text-gray-500'">Enter</kbd>
            to submit
            <span class="mx-1.5" :class="$store.theme.dark ? 'text-gray-700' : 'text-gray-300'">&middot;</span>
            <kbd class="px-1.5 py-0.5 rounded text-[10px] font-mono border" :class="$store.theme.dark ? 'bg-dark-700 border-dark-600 text-gray-500' : 'bg-gray-100 border-gray-200 text-gray-500'">Tab</kbd>
            to toggle visibility
          </p>
        </div>
      </div>

      <!-- Version tag -->
      <p class="text-center mt-6 text-[11px]" style="color:var(--c-text-muted)">LogLens v1.0 &mdash; Internal Use Only</p>
    </div>
  </div>
</div>

<div x-show="$store.auth.loggedIn" x-cloak class="min-h-screen flex flex-col" x-data="analyzer">
    <header class="sticky top-0 z-50 transition-colors" :class="$store.theme.dark ? 'border-b' : 'border-b'" :style="$store.theme.dark ? 'background:rgba(8,47,73,0.85);backdrop-filter:blur(12px);border-bottom-color:rgba(212,175,55,0.25)' : 'background:var(--c-surface);border-bottom-color:var(--c-border)'">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--c-surface-raised);border:1px solid var(--c-border)">
            <svg class="w-4 h-4" style="color:var(--c-accent)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <span class="text-lg font-bold tracking-tight" style="color:var(--c-text)">LogLens</span>
        </a>
        <div class="flex items-center gap-2">
          <button @click="showHistory()" class="text-sm transition px-2.5 py-1.5 rounded-lg min-h-[44px] flex items-center gap-1.5" style="color:var(--c-text-muted)" title="Report History">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="hidden sm:inline">History</span>
          </button>
          <button @click="$store.theme.toggle()" class="text-sm transition px-2.5 py-1.5 rounded-lg min-h-[44px] min-w-[44px] flex items-center justify-center" style="color:var(--c-text-muted)" :title="$store.theme.dark ? 'Switch to light mode' : 'Switch to dark mode'">
            <svg x-show="$store.theme.dark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg x-show="!$store.theme.dark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          </button>
          <button @click="$store.auth.logout(); reset()" class="text-sm transition px-3 py-1.5 rounded-lg min-h-[44px]" style="color:var(--c-text-muted)">
            Logout
          </button>
        </div>
      </div>
    </header>

    <main id="main-content" class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8" tabindex="-1">

      <template x-if="view === 'upload'">
        <div class="fade-in max-w-2xl mx-auto">
          <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white">Analyze Logs</h2>
            <p class="text-gray-400 mt-1 text-sm">Upload a log file or paste content directly for analysis.</p>
          </div>
          <div class="bg-dark-800 rounded-xl border border-dark-600 shadow-lg p-6 sm:p-8">
            <template x-if="error">
              <div class="mb-5 p-3 rounded-lg bg-danger/10 border border-danger/20 text-danger text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                <span x-text="error"></span>
              </div>
            </template>

            <div class="flex gap-1 p-1 bg-dark-700 rounded-lg mb-5">
              <button @click="inputMode='file'; file=null" :class="inputMode==='file' ? 'tab-active' : 'text-gray-400 hover:text-gray-200'" class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition min-h-[44px]">Upload File</button>
              <button @click="inputMode='paste'; file=null" :class="inputMode==='paste' ? 'tab-active' : 'text-gray-400 hover:text-gray-200'" class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition min-h-[44px]">Paste Logs</button>
              <button @click="inputMode='batch'; resetBatch()" :class="inputMode==='batch' ? 'tab-active' : 'text-gray-400 hover:text-gray-200'" class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition min-h-[44px]">Multi-File</button>
            </div>

            <template x-if="inputMode==='file'">
              <div class="mb-5"
                @dragover.prevent="dragOver=true"
                @dragleave.prevent="dragOver=false"
                @drop.prevent="dragOver=false; file=$event.dataTransfer.files[0]; if(file) inputMode='file'"
                :class="dragOver ? 'drag-active' : ''"
                class="border-2 border-dashed border-dark-600 rounded-xl p-10 text-center cursor-pointer hover:border-gray-500 transition"
                role="button" tabindex="0"
                @click="$refs.fileInput.click()"
                @keydown.enter="$refs.fileInput.click()"
                @keydown.space.prevent="$refs.fileInput.click()">
                <input type="file" x-ref="fileInput" class="hidden" @change="file=$event.target.files[0]; if(file) inputMode='file'">
                <template x-if="!file">
                  <div>
                    <svg class="w-10 h-10 mx-auto mb-3" style="color:var(--c-accent-mid)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                    </svg>
                    <p class="text-gray-400 text-sm">Drop a log file here or click to browse</p>
                    <p class="text-gray-600 text-xs mt-1">Supports .log, .txt, .gz, or any text file (max 50MB)</p>
                  </div>
                </template>
                <template x-if="file">
                  <div class="flex items-center justify-center gap-3">
                    <svg class="w-6 h-6 text-accent-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <div class="text-left">
                      <p class="text-white text-sm font-medium" x-text="file.name"></p>
                      <p class="text-gray-500 text-xs" x-text="(file.size / 1024).toFixed(1) + ' KB'"></p>
                    </div>
                    <button @click.stop="file=null" class="ml-2 text-gray-500 hover:text-danger transition">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="inputMode==='paste'">
              <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">Log Content <span x-show="pasteContent.trim()" class="text-gray-500 font-normal" x-text="'(' + pasteContent.trim().split('\\n').filter(l => l.trim()).length + ' lines)'"></span></label>
                <textarea x-model="pasteContent" rows="10" @input="_autoSaveDraft()" placeholder="Paste your log content here...&#10;&#10;Each line should be a single log entry." class="w-full px-4 py-3 rounded-lg bg-dark-700 border border-dark-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm font-mono resize-y"></textarea>
              </div>
            </template>

            <template x-if="inputMode==='batch'">
              <div class="mb-5 space-y-4">
                <template x-if="batchError">
                  <div class="p-3 rounded-lg bg-danger/10 border border-danger/20 text-danger text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                    <span x-text="batchError"></span>
                  </div>
                </template>

                <div class="border-2 border-dashed border-dark-600 rounded-xl p-6 text-center hover:border-gray-500 transition"
                  @dragover.prevent="$el.classList.add('drag-active')"
                  @dragleave.prevent="$el.classList.remove('drag-active')"
                  @drop.prevent="$el.classList.remove('drag-active'); Array.from($event.dataTransfer.files).forEach(f => addBatchFile(f))"
                  @click="$refs.batchFileInput.click()"
                  role="button" tabindex="0" @keydown.enter="$refs.batchFileInput.click()">
                  <input type="file" x-ref="batchFileInput" class="hidden" multiple @change="Array.from($event.target.files).forEach(f => addBatchFile(f)); $event.target.value=''">
                  <svg class="w-8 h-8 mx-auto mb-2" style="color:var(--c-accent-mid)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                  </svg>
                  <p class="text-gray-400 text-sm">Drop files here or click to add</p>
                  <p class="text-gray-600 text-xs mt-1">Add multiple log files for comparison or correlation</p>
                </div>

                <div class="space-y-2">
                  <template x-for="(bf, idx) in batchFiles" :key="idx">
                    <div class="flex items-center gap-3 p-3 rounded-lg bg-dark-700 border border-dark-600">
                      <svg class="w-4 h-4 shrink-0" style="color:var(--c-accent-mid)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                      <div class="flex-1 min-w-0">
                        <input type="text" x-model="bf.name" class="w-full bg-transparent text-white text-sm focus:outline-none border-b border-transparent focus:border-accent-500 transition">
                        <p class="text-xs text-gray-500" x-text="bf.content ? bf.content.split('\\n').filter(l=>l.trim()).length + ' lines' : 'Loading...'"></p>
                      </div>
                      <button @click="removeBatchFile(idx)" class="text-gray-500 hover:text-danger transition p-1">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                      </button>
                    </div>
                  </template>
                </div>

                </div>
              </div>
            </template>

            <div class="flex items-end gap-4 mb-4">
              <div class="flex-1">
                <label class="block text-sm font-medium text-gray-300 mb-2">Log Type</label>
                <select x-model="logType" class="w-full px-4 py-3 rounded-lg bg-dark-700 border border-dark-600 text-white focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm appearance-none">
                  <option value="auto">Auto-Detect</option>
                  <option value="nginx_access">Nginx Access</option>
                  <option value="nginx_error">Nginx Error</option>
                  <option value="container">Container</option>
                  <option value="syslog">Syslog</option>
                  <option value="api_backend">API Backend</option>
                  <option value="postgres">PostgreSQL</option>
                  <option value="csv">CSV</option>
                </select>
              </div>
            </div>

            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-300 mb-2">Exclude IPs <span class="text-gray-500 font-normal">(optional)</span></label>
              <input type="text" x-model="excludeIps" @input="excludeIps = excludeIps.replace(/[^0-9.,\\s]/g, '')" placeholder="e.g. 192.168.1.1, 10.0.0.5 — comma-separated"
                class="w-full px-4 py-2.5 rounded-lg bg-dark-700 border border-dark-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm">
              <p class="text-xs text-gray-500 mt-1">Comma-separated IPs to skip from analysis</p>
            </div>

            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-300 mb-2">Performance Thresholds <span class="text-gray-500 font-normal">(optional, overrides defaults)</span></label>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs text-gray-500 mb-1">Slow Query Threshold</label>
                  <div class="flex items-center gap-2">
                    <input type="number" x-model="slowThreshold" placeholder="10" min="0" step="0.5"
                      class="w-full px-3 py-2 rounded-lg bg-dark-700 border border-dark-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm">
                    <span class="text-xs text-gray-500 shrink-0">sec</span>
                  </div>
                </div>
                <div>
                  <label class="block text-xs text-gray-500 mb-1">Critical Threshold</label>
                  <div class="flex items-center gap-2">
                    <input type="number" x-model="criticalThreshold" placeholder="30" min="0" step="1"
                      class="w-full px-3 py-2 rounded-lg bg-dark-700 border border-dark-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm">
                    <span class="text-xs text-gray-500 shrink-0">sec</span>
                  </div>
                </div>
              </div>
              <p class="text-xs text-gray-500 mt-1">Adjust per-session: slow (default 10s), critical (default 30s)</p>
            </div>

            <div class="mb-4">
              <label class="block text-xs font-semibold uppercase tracking-widest mb-1.5" style="color:var(--c-text-muted)">Session Label <span class="font-normal">(optional)</span></label>
              <input type="text" x-model="reportLabel" placeholder="e.g. Post-deploy perf check 2026-07-18"
                class="w-full px-4 py-2.5 rounded-lg bg-dark-700 border border-dark-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition text-sm">
            </div>

            <button x-show="inputMode !== 'batch'" @click="analyze()" :disabled="!file && !pasteContent.trim()" class="w-full py-3 px-4 rounded-lg text-white font-semibold transition text-sm flex items-center justify-center gap-2 min-h-[44px]"
              style="background:linear-gradient(135deg, var(--c-accent-mid), var(--c-accent-deep));box-shadow:0 4px 20px rgba(212,175,55,0.25);opacity:0.95"
              :disabled="!file && !pasteContent.trim()"
              :class="(!file && !pasteContent.trim()) ? 'opacity-40 cursor-not-allowed' : 'hover:shadow-[0_6px_28px_rgba(212,175,55,0.4)] hover:opacity-100'">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              Analyze Logs
            </button>

            <div x-show="inputMode === 'batch'" class="flex gap-3">
              <button @click="analyzeBatch()" :disabled="!batchFiles.length || batchLoading" class="flex-1 py-3 px-4 rounded-lg text-white font-semibold transition text-sm flex items-center justify-center gap-2 min-h-[44px]"
                style="background:linear-gradient(135deg, var(--c-accent-mid), var(--c-accent-deep));box-shadow:0 4px 20px rgba(212,175,55,0.25)"
                :class="(!batchFiles.length || batchLoading) ? 'opacity-40 cursor-not-allowed' : 'hover:shadow-[0_6px_28px_rgba(212,175,55,0.4)] hover:opacity-100'">

      <template x-if="view === 'history'">

              <option value="api_backend">API Backend</option>
              <option value="postgres">PostgreSQL</option>

                      <template x-if="rec.summary && rec.summary.health">
                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium"

                            'bg-success/15 text-success': rec.summary.health === 'healthy',
                            'bg-warning/15 text-warning': rec.summary.health === 'degraded',
                            'bg-danger/15 text-danger': rec.summary.health === 'critical',

                  </div>
                  <div class="flex items-center gap-2 shrink-0">

                    </button>

                </div>
              </div>

          </div>

      <template x-if="view === 'processing'">

                      'bg-warning/15 text-warning border-warning/20': report.detection_confidence >= 0.4 && report.detection_confidence < 0.7,
                      'bg-danger/15 text-danger border-danger/20': report.detection_confidence < 0.4,

                <template x-if="report.summary && report.summary.health">

                      'bg-warning/15 text-warning border-warning/20': report.summary.health === 'degraded',
